#textdomain wesnoth-Wesnoth_Roguelite

#define ROGUELITE_DEATH_EVENT
    [event]
        name = last_breath
        first_time_only = no
        [filter]
            id = hero
        [/filter]

        [message]
            speaker = narrator
            image = "wesnoth-icon.png"
            message = _"<b>$hero_name has fallen...</b>"
        [/message]

        # Calculate meta-currency earned
        {VARIABLE run_reward $floors_cleared}
        {VARIABLE_OP run_reward multiply 10}
        {VARIABLE_OP run_reward add $kills_this_run}

        [message]
            speaker = narrator
            image = "wesnoth-icon.png"
            message = _"<b>Run $run_number complete.</b>

Floors cleared: $floors_cleared
Enemies slain: $kills_this_run
Points earned: <b>$run_reward</b>"
        [/message]

        {VARIABLE_OP meta_currency add $run_reward}
        {CLEAR_VARIABLE run_reward}

        # Update high score
        [if]
            [variable]
                name = floors_cleared
                greater_than = $best_floor_reached
            [/variable]
            [then]
                {VARIABLE best_floor_reached $floors_cleared}
            [/then]
        [/if]

        [message]
            speaker = narrator
            image = "wesnoth-icon.png"
            message = _"Total points: <b>$meta_currency</b>
Best run: Floor $best_floor_reached

What will you do?"
            variable = death_choice
            [option]
                label = _"Try again"
                description = _"Keep your upgrades and start a new run as $hero_name."
                value = retry
            [/option]
            [option]
                label = _"Start fresh"
                description = _"Pick a new faction and leader. Keeps meta-currency."
                value = reroll
            [/option]
            [option]
                label = _"Full reset"
                description = _"Reset everything — all upgrades, all currency. Start over."
                value = reset
            [/option]
        [/message]

        # Handle retry — skip character select, reset run vars, go to path choice
        [if]
            [variable]
                name = death_choice
                equals = retry
            [/variable]
            [then]
                {VARIABLE_OP run_number add 1}
                {VARIABLE kills_this_run 0}
                {VARIABLE floors_cleared 0}
                [endlevel]
                    result = victory
                    next_scenario = roguelite_path_choice
                    bonus = no
                    carryover_percentage = 0
                    carryover_report = no
                    linger_mode = no
                [/endlevel]
            [/then]
        [/if]

        # Handle reroll — go to character select
        [if]
            [variable]
                name = death_choice
                equals = reroll
            [/variable]
            [then]
                {VARIABLE_OP run_number add 1}
                {VARIABLE kills_this_run 0}
                {VARIABLE floors_cleared 0}
                [endlevel]
                    result = victory
                    next_scenario = roguelite_character_select
                    bonus = no
                    carryover_percentage = 0
                    carryover_report = no
                    linger_mode = no
                [/endlevel]
            [/then]
        [/if]

        # Handle full reset
        [if]
            [variable]
                name = death_choice
                equals = reset
            [/variable]
            [then]
                {VARIABLE run_number 0}
                {VARIABLE meta_currency 0}
                {VARIABLE best_floor_reached 0}
                {VARIABLE total_kills 0}
                {VARIABLE meta_bonus_gold 0}
                {VARIABLE meta_bonus_hp 0}
                {VARIABLE meta_bonus_income 0}
                [endlevel]
                    result = victory
                    next_scenario = roguelite_run_setup
                    bonus = no
                    carryover_percentage = 0
                    carryover_report = no
                    linger_mode = no
                [/endlevel]
            [/then]
        [/if]

        {CLEAR_VARIABLE death_choice}
    [/event]
#enddef
