    # === ENCOUNTER SYSTEM ===
    # 25% chance per battle. Picks a random village hex as trigger.
    [event]
        name = prestart
        [lua]
            code = <<
                -- DEBUG: set to true to force encounters every battle
                local FORCE_ENCOUNTER = true

                -- Roll 25% chance for encounter (or force it)
                if not FORCE_ENCOUNTER and wesnoth.random(1, 4) ~= 1 then
                    wesnoth.set_variable("encounter_active", "no")
                    return
                end
                wesnoth.set_variable("encounter_active", "yes")

                -- Find all village hexes on the map
                local villages = wesnoth.map.find{terrain="*^V*"}
                if #villages == 0 then
                    -- Try alternate village terrains
                    villages = wesnoth.map.find{terrain="*^Vh,*^Vha,*^Vhh,*^Ve,*^Vd,*^Vc,*^Vct,*^Vo,*^Vda,*^Vl,*^Vu,*^Vud,*^Vhs,*^Vhr"}
                end
                if #villages == 0 then
                    wesnoth.set_variable("encounter_active", "no")
                    return
                end

                -- Pick a random village
                local v = villages[wesnoth.random(1, #villages)]
                wesnoth.set_variable("encounter_x", v[1])
                wesnoth.set_variable("encounter_y", v[2])

                -- Pick the encounter unit
                local ENC = wesnoth.dofile("~add-ons/Wesnoth_Roguelite/lua/encounter.lua")
                local bn = wesnoth.get_variable("battle_number") or 1
                local unlocked = wesnoth.get_variable("encounter_pool_unlocked") or ""
                local encountered = wesnoth.get_variable("encountered_units") or ""
                local unit = ENC.pick_unit(bn, unlocked, encountered)
                if unit then
                    wesnoth.set_variable("encounter_unit_type", unit.type)
                    -- Roll 70% friendly, 30% hostile
                    local roll = wesnoth.random(1, 10)
                    if roll <= 7 then
                        wesnoth.set_variable("encounter_friendly", 1)
                    else
                        wesnoth.set_variable("encounter_friendly", 0)
                    end
                else
                    wesnoth.set_variable("encounter_active", "no")
                end
            >>
        [/lua]
    [/event]

    # Trigger when any player unit moves onto the encounter village
    [event]
        name = moveto
        first_time_only = yes
        [filter]
            side = 1
            [filter_location]
                x = $encounter_x
                y = $encounter_y
            [/filter_location]
        [/filter]
        [if]
            [variable]
                name = encounter_active
                equals = yes
            [/variable]
            [then]
                [lua]
                    code = <<
                        local ENC = wesnoth.dofile("~add-ons/Wesnoth_Roguelite/lua/encounter.lua")
                        local utype = wesnoth.get_variable("encounter_unit_type")
                        local friendly = wesnoth.get_variable("encounter_friendly") == 1
                        local ex = wesnoth.get_variable("encounter_x")
                        local ey = wesnoth.get_variable("encounter_y")

                        -- Find an open adjacent hex to spawn on
                        local a, b, c, d, e, f = wesnoth.map.get_adjacent_hexes(ex, ey)
                        local adj = {a, b, c, d, e, f}
                        local spawn_x, spawn_y
                        for _, hex in ipairs(adj) do
                            local u = wesnoth.units.get(hex[1], hex[2])
                            if not u and wesnoth.current.map:on_board(hex) then
                                spawn_x, spawn_y = hex[1], hex[2]
                                break
                            end
                        end

                        if not spawn_x then
                            -- No open hex, skip encounter
                            return
                        end

                        -- Get dialogue
                        local dlg = ENC.get_dialogue(utype)

                        -- Always spawn as neutral third party first
                        local enc_unit = wesnoth.units.create{
                            type = utype,
                            side = 3,
                            x = spawn_x,
                            y = spawn_y,
                            id = "encounter_" .. tostring(wesnoth.random(1000, 9999)),
                            random_traits = true,
                            generate_name = true,
                        }
                        enc_unit:to_map()

                        -- Ensure side 3 is visible
                        wesnoth.wml_actions.modify_side{
                            side = 3,
                            hidden = false,
                            user_team_name = "Unknown",
                        }

                        -- Dialogue sequence
                        local enc_id = enc_unit.id
                        local hero_id = "hero"

                        -- 1. Encounter unit greeting
                        wesnoth.wml_actions.message{
                            id = enc_id,
                            message = dlg[1],
                        }
                        -- 2. Player response
                        wesnoth.wml_actions.message{
                            id = hero_id,
                            message = dlg[2],
                        }
                        -- 3. Resolution — switch side based on outcome
                        if friendly then
                            wesnoth.wml_actions.message{
                                id = enc_id,
                                message = dlg[3],
                            }
                            -- Switch to player side as loyal
                            wesnoth.wml_actions.modify_unit{
                                wml.tag.filter{id=enc_id},
                                side = 1,
                            }
                            -- Add loyal trait
                            local u = wesnoth.units.find{id=enc_id}[1]
                            if u then
                                u:add_modification("trait", {
                                    id = "loyal",
                                    male_name = "loyal",
                                    female_name = "loyal",
                                    description = "Zero upkeep",
                                    wml.tag.effect{apply_to="loyal"},
                                    wml.tag.effect{
                                        apply_to = "overlay",
                                        add = "misc/loyal-icon.png",
                                    },
                                })
                            end
                            wesnoth.wml_actions.modify_side{
                                side = 3,
                                hidden = true,
                            }
                        else
                            wesnoth.wml_actions.message{
                                id = enc_id,
                                message = dlg[4],
                            }
                            -- Stays as hostile side 3
                        end

                        -- Mark encounter as consumed and track unit type for this run
                        wesnoth.set_variable("encounter_active", "no")
                        local prev = wesnoth.get_variable("encountered_units") or ""
                        if prev == "" then
                            wesnoth.set_variable("encountered_units", utype)
                        else
                            wesnoth.set_variable("encountered_units", prev .. "," .. utype)
                        end
                    >>
                [/lua]
            [/then]
        [/if]
    [/event]

    [event]
        name = victory
        [if]
            [variable]
                name = hero_died
                not_equals = yes
            [/variable]
            [then]
                {VARIABLE_OP floors_cleared add 1}

                # Track last battle context for path choice flavor
                {VARIABLE last_enemy_leader $current_enemy_leader}
                {VARIABLE last_territory_name $current_territory_name}

                # Track territories won
                [if]
                    [variable]
                        name = territories_won
                        equals = ""
                    [/variable]
                    [then]
                        {VARIABLE territories_won $current_territory_name}
                    [/then]
                    [else]
                        [set_variable]
                            name = territories_won
                            value = "$territories_won, $current_territory_name"
                        [/set_variable]
                    [/else]
                [/if]

                # Award renown (1 normal, 3 boss)
                {VARIABLE_OP renown add 1}

                # Boss battles (5, 10, 15) award extra renown + gold
                [if]
                    [or]
                        [variable]
                            name = battle_number
                            equals = 5
                        [/variable]
                        [variable]
                            name = battle_number
                            equals = 10
                        [/variable]
                        [variable]
                            name = battle_number
                            equals = 15
                        [/variable]
                    [/or]
                    [then]
                        {VARIABLE_OP renown add 2}
                        {VARIABLE last_scenario_type "boss"}
                        # Track boss name
                        [if]
                            [variable]
                                name = bosses_slain
                                equals = ""
                            [/variable]
                            [then]
                                {VARIABLE bosses_slain $current_enemy_leader}
                            [/then]
                            [else]
                                [set_variable]
                                    name = bosses_slain
                                    value = "$bosses_slain, $current_enemy_leader"
                                [/set_variable]
                            [/else]
                        [/if]
                        [gold]
                            side = 1
                            amount = 150
                        [/gold]
                        [message]
                            speaker = hero
                            message = _"A worthy foe defeated. Our renown grows. (+3 Renown, +150 Gold)"
                        [/message]
                    [/then]
                    [else]
                        {VARIABLE last_scenario_type "battle"}
                    [/else]
                [/if]

                # Increment battle number AFTER boss check
                {VARIABLE_OP battle_number add 1}

                # Track defeated leader (won't appear again this run)
                [if]
                    [variable]
                        name = defeated_leaders
                        equals = ""
                    [/variable]
                    [then]
                        {VARIABLE defeated_leaders $current_enemy_leader}
                    [/then]
                    [else]
                        [set_variable]
                            name = defeated_leaders
                            value = "$defeated_leaders,$current_enemy_leader"
                        [/set_variable]
                    [/else]
                [/if]

                # Update act number
                [if]
                    [variable]
                        name = battle_number
                        greater_than = 10
                    [/variable]
                    [then]
                        {VARIABLE act_number 3}
                    [/then]
                    [elseif]
                        [variable]
                            name = battle_number
                            greater_than = 5
                        [/variable]
                        [then]
                            {VARIABLE act_number 2}
                        [/then]
                    [/elseif]
                [/if]
            [/then]
        [/if]
        {CLEAR_VARIABLE hero_died}

        # Meta-progression: unlock faction on final boss victory + pool unlocks
        [lua]
            code = <<
                local bn = wesnoth.get_variable("battle_number") or 1
                local fac = wesnoth.get_variable("chosen_faction") or ""
                local factions_unlocked = wesnoth.get_variable("factions_unlocked") or ""

                -- Final boss victory: unlock paired faction
                if bn > 15 then
                    local pairs = {loyalist="undead", elf="drake", orc="knalgan"}
                    local new_fac = pairs[fac]
                    if new_fac and not factions_unlocked:find(new_fac) then
                        factions_unlocked = factions_unlocked .. "," .. new_fac
                        wesnoth.set_variable("factions_unlocked", factions_unlocked)
                        wesnoth.wml_actions.message{
                            speaker = "narrator",
                            image = "wesnoth-icon.png",
                            message = "Your victory has drawn new allies. A new faction is now available!",
                        }
                    end
                end

                -- Past Boss 1: unlock one random wanderer or encounter (once per run)
                local already_unlocked = wesnoth.get_variable("run_pool_unlocked") or ""
                if bn > 5 and already_unlocked ~= "yes" then
                    wesnoth.set_variable("run_pool_unlocked", "yes")
                    local wand_unlocked = wesnoth.get_variable("wanderer_pool_unlocked") or ""
                    local enc_unlocked = wesnoth.get_variable("encounter_pool_unlocked") or ""

                    -- Wanderer unlock order (by gold cost)
                    local wand_order = {
                        "Deathblade","Royal Warrior","Orcish Nightblade",
                        "Merman Javelineer","Dwarvish Dragonguard","Dwarvish Lord",
                        "Draug","Nightgaunt","Spectre","Paladin","Grand Knight",
                    }
                    -- Encounter unlock order (by gold cost)
                    local enc_order = {
                        "Wose Shaman","Wraith","Death Squire","Shadow",
                        "Orcish Ruler","Mermaid Diviner","Dwarvish Runemaster",
                        "Inferno Drake","Drake Flameheart","Elvish Enchantress",
                        "Elvish High Lord","Great Troll","Death Knight",
                        "Orcish Sovereign","Lich","Necromancer",
                        "Dwarvish Arcanister","Grand Marshal","Great Mage",
                        "Armageddon Drake","Elvish Sylph","Ancient Lich",
                    }

                    -- Find next locked unit in each list
                    local function next_locked(order, unlocked_csv)
                        for _, name in ipairs(order) do
                            if not unlocked_csv:find(name, 1, true) then
                                return name
                            end
                        end
                        return nil
                    end

                    local next_wand = next_locked(wand_order, wand_unlocked)
                    local next_enc = next_locked(enc_order, enc_unlocked)

                    -- Pick randomly between the two (if both have units left)
                    local pick_type, pick_name
                    if next_wand and next_enc then
                        if wesnoth.random(1, 2) == 1 then
                            pick_type, pick_name = "wanderer", next_wand
                        else
                            pick_type, pick_name = "encounter", next_enc
                        end
                    elseif next_wand then
                        pick_type, pick_name = "wanderer", next_wand
                    elseif next_enc then
                        pick_type, pick_name = "encounter", next_enc
                    end

                    if pick_name then
                        if pick_type == "wanderer" then
                            if wand_unlocked == "" then
                                wesnoth.set_variable("wanderer_pool_unlocked", pick_name)
                            else
                                wesnoth.set_variable("wanderer_pool_unlocked", wand_unlocked .. "," .. pick_name)
                            end
                        else
                            if enc_unlocked == "" then
                                wesnoth.set_variable("encounter_pool_unlocked", pick_name)
                            else
                                wesnoth.set_variable("encounter_pool_unlocked", enc_unlocked .. "," .. pick_name)
                            end
                        end

                        wesnoth.wml_actions.message{
                            speaker = "narrator",
                            image = "wesnoth-icon.png",
                            message = "You have unlocked a new " .. pick_type .. ": " .. pick_name .. "!",
                        }
                    end
                end
            >>
        [/lua]

        # Gold carryover: 70%, early finish bonus = 2g/turn saved
        # Route to tavern after battles 2,4,7,9,12,14 — otherwise path choice
        [if]
            [or]
                [variable]
                    name = battle_number
                    equals = 3
                [/variable]
                [variable]
                    name = battle_number
                    equals = 5
                [/variable]
                [variable]
                    name = battle_number
                    equals = 8
                [/variable]
                [variable]
                    name = battle_number
                    equals = 10
                [/variable]
                [variable]
                    name = battle_number
                    equals = 13
                [/variable]
                [variable]
                    name = battle_number
                    equals = 15
                [/variable]
            [/or]
            [then]
                [endlevel]
                    result = victory
                    next_scenario = roguelite_tavern
                    carryover_percentage = 70
                    bonus = yes
                    carryover_report = yes
                    carryover_add = yes
                [/endlevel]
            [/then]
            [else]
                [endlevel]
                    result = victory
                    next_scenario = roguelite_path_choice
                    carryover_percentage = 70
                    bonus = yes
                    carryover_report = yes
                    carryover_add = yes
                [/endlevel]
            [/else]
        [/if]
    [/event]

    [event]
        name = die
        first_time_only = no
        [filter]
            side = 2
        [/filter]
        {VARIABLE_OP kills_this_run add 1}
        {VARIABLE_OP total_kills add 1}
    [/event]

    # Time runs out — treat as death
    [event]
        name = time over
        [kill]
            id = hero
            fire_event = yes
        [/kill]
    [/event]

    {ROGUELITE_DEATH_EVENT}
#enddef
