#textdomain wesnoth-Wesnoth_Roguelite

[scenario]
    id = roguelite_path_choice
    name = _"Choose Your Path"
    next_scenario = roguelite_floor_forest

    map_file = run_setup.map
    turns = 1
    victory_when_enemies_defeated = no

    [side]
        side = 1
        controller = human
        hidden = yes
        [leader]
            id = hero
            type = Spearman
            canrecruit = yes
        [/leader]
    [/side]

    [event]
        name = prestart

        {VARIABLE current_floor $floors_cleared}
        {VARIABLE_OP current_floor add 1}

        # TEST MODE: pick biome directly
        [message]
            speaker = narrator
            image = "wesnoth-icon.png"
            message = _"<b>Floor $current_floor</b> — Pick a biome to test:"
            variable = current_biome
            [option]
                label = _"Forest"
                value = forest
            [/option]
            [option]
                label = _"Elven Forest"
                value = elven_forest
            [/option]
            [option]
                label = _"Plains"
                value = plains
            [/option]
            [option]
                label = _"Farmland"
                value = farmland
            [/option]
            [option]
                label = _"Valley"
                value = valley
            [/option]
            [option]
                label = _"Mountain"
                value = mountain
            [/option]
            [option]
                label = _"Swamp"
                value = swamp
            [/option]
            [option]
                label = _"Winter"
                value = winter
            [/option]
            [option]
                label = _"Cave"
                value = cave
            [/option]
            [option]
                label = _"Lava Cave"
                value = lava
            [/option]
            [option]
                label = _"Mushroom Grove"
                value = mushroom
            [/option]
            [option]
                label = _"Desert"
                value = desert
            [/option]
            [option]
                label = _"Coastal"
                value = coastal
            [/option]
        [/message]

        [endlevel]
            result = victory
            next_scenario = roguelite_floor_$current_biome
            bonus = no
            carryover_percentage = 0
            carryover_report = no
            linger_mode = no
        [/endlevel]
    [/event]
[/scenario]
