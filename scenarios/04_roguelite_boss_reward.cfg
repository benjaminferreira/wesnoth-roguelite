#textdomain wesnoth-Wesnoth_Roguelite
[scenario]
    id = roguelite_boss_reward
    name = _"Spoils of War"
    next_scenario = roguelite_path_choice

    map_file = tavern.map
    turns = 1
    victory_when_enemies_defeated = no

    [side]
        side = 1
        controller = human
        hidden = yes
        gold = 0
        [leader]
            id = hero
            type = Spearman
            canrecruit = yes
        [/leader]
    [/side]

    [event]
        name = prestart

        [lua]
            code = <<
                local UI = wesnoth.dofile("~add-ons/Wesnoth_Roguelite/lua/roguelite_ui.lua")
                local BR = wesnoth.dofile("~add-ons/Wesnoth_Roguelite/lua/boss_rewards.lua")

                local bn = wesnoth.get_variable("battle_number") or 6
                local boss_name = wesnoth.get_variable("boss1_title") or "the boss"
                local boss_id = wesnoth.get_variable("boss1_id") or nil
                local renown = wesnoth.get_variable("renown") or 0

                -- Determine tier
                local tier = 1
                if bn > 10 then tier = 2 end

                local options = BR.pick_options(tier, boss_id)
                if #options == 0 then
                    UI.message{title="Victory!", message="No rewards available."}
                else
                    -- Build vertical roster summary
                    local roster = "\n\n<small><b>Renown:</b> " .. renown .. "</small>"
                    local recall_all = wesnoth.units.find_on_recall{side=1}
                    if #recall_all > 0 then
                        local counts, order = {}, {}
                        for _, u in ipairs(recall_all) do
                            local t = tostring(u.type)
                            if not counts[t] then counts[t] = 0; order[#order+1] = t end
                            counts[t] = counts[t] + 1
                        end
                        roster = roster .. "\n<small><b>Recall List:</b></small>"
                        for _, t in ipairs(order) do
                            roster = roster .. "\n<small>  " .. t .. (counts[t] > 1 and (" ×" .. counts[t]) or "") .. "</small>"
                        end
                    end
                    local side = wesnoth.sides[1]
                    if side then
                        local recruits = side.recruit
                        if type(recruits) == "table" and #recruits > 0 then
                            roster = roster .. "\n<small><b>Recruit Pool:</b></small>"
                            for _, r in ipairs(recruits) do
                                roster = roster .. "\n<small>  " .. r .. "</small>"
                            end
                        end
                    end

                    -- Build choice list
                    local opts = {}
                    for _, r in ipairs(options) do
                        opts[#opts+1] = {label=r.label, image=r.image or "", description=r.description}
                    end

                    local reward_intros = {
                        "The territory is yours. Your warband claims the spoils.",
                        "Another domain conquered. Word of your victory draws new opportunities.",
                        "The land bends to your banner. With conquest comes choice.",
                        "This territory answers to you now. Your officers present what they've secured.",
                        "The stronghold falls. As the new lord of these lands, the spoils are yours to divide.",
                    }
                    local reward_intro = reward_intros[wesnoth.random(1, #reward_intros)]

                    local choice = UI.choose{
                        title="Spoils of War — " .. boss_name .. " Defeated",
                        message=reward_intro .. roster,
                        options=opts,
                    }

                    local reward = options[choice]

                    if reward.target == "pick" then
                        -- Build detailed unit list
                        local recall_units = wesnoth.units.find_on_recall{side=1}
                        local map_units = wesnoth.units.find_on_map{side=1}
                        local all_units = {}
                        for _, u in ipairs(map_units) do all_units[#all_units+1] = u end
                        for _, u in ipairs(recall_units) do all_units[#all_units+1] = u end

                        local unit_opts = {}
                        for _, u in ipairs(all_units) do
                            local img = u.__cfg.image or ""
                            local atk_parts = {}
                            for _, a in ipairs(u.attacks) do
                                atk_parts[#atk_parts+1] = tostring(a.name) .. " " .. a.damage .. "×" .. a.number .. " " .. a.type .. " " .. a.range
                            end
                            local atk_line = #atk_parts > 0 and table.concat(atk_parts, " | ") or "no attacks"
                            local traits = {}
                            local mods = wml.get_child(u.__cfg, "modifications")
                            if mods then
                                for trait in wml.child_range(mods, "trait") do
                                    if trait.id and trait.id ~= "" then traits[#traits+1] = trait.id end
                                end
                            end
                            local trait_str = #traits > 0 and ("\nTraits: " .. table.concat(traits, ", ")) or ""
                            local abilities = {}
                            local abil_seen = {}
                            local abs = wml.get_child(u.__cfg, "abilities")
                            if abs then
                                for _, pair in ipairs(abs) do
                                    local name = pair[2] and pair[2].name
                                    if name and name ~= "" and not abil_seen[name] then
                                        abil_seen[name] = true
                                        abilities[#abilities+1] = tostring(name)
                                    end
                                end
                            end
                            local abil_str = #abilities > 0 and (" | Abilities: " .. table.concat(abilities, ", ")) or ""
                            local race = u.race or ""
                            local desc = "L" .. u.level .. " " .. race .. " | " .. u.experience .. "/" .. u.max_experience .. " XP | " .. u.hitpoints .. "/" .. u.max_hitpoints .. " HP"
                                .. "\n" .. atk_line .. trait_str .. abil_str
                            unit_opts[#unit_opts+1] = {
                                label=tostring(u.name) .. " — " .. tostring(u.type),
                                image=img,
                                description=desc,
                            }
                        end

                        local pick_count = math.min(reward.pick_count, #all_units)
                        local picks = UI.multi_choose{
                            title=reward.label,
                            message="Choose " .. pick_count .. " units to receive this reward.",
                            options=unit_opts,
                            count=pick_count,
                        }

                        local chosen_units = {}
                        for _, idx in ipairs(picks) do
                            chosen_units[#chosen_units+1] = all_units[idx]
                        end
                        BR.apply(reward.id, chosen_units, reward)

                        -- Single combined popup: flavor + mechanical confirmation
                        local names = {}
                        for _, u in ipairs(chosen_units) do names[#names+1] = tostring(u.name) end
                        local conf = reward.confirm or "received " .. reward.label
                        local msg = (reward.flavor or "") .. "\n\n<small>(" .. table.concat(names, ", ") .. " " .. conf .. ".)</small>"
                        UI.message{title=reward.label, message=msg}
                    else
                        BR.apply(reward.id, {}, reward)
                        -- Single combined popup: flavor + mechanical confirmation
                        local conf = reward.confirm or reward.label .. " applied"
                        local msg = (reward.flavor or "") .. "\n\n<small>(" .. conf .. ".)</small>"
                        UI.message{title=reward.label, message=msg}
                    end
                end
            >>
        [/lua]

        # Act transition narrative
        [lua]
            code = <<
                local bn = wesnoth.get_variable("battle_number") or 6
                local fac = wesnoth.get_variable("chosen_faction") or "loyalist"

                local act2 = {
                    loyalist = "The warlord's territory is yours. For the first time, other warbands give you a wide berth on the road. You're not just another sellsword anymore — you're a name. And names attract attention, both welcome and otherwise.",
                    elf = "The warlord's domain falls silent. The forest breathes easier with one less warband trampling through it. But the corruption runs deeper than any single territory. The elders were wrong to wait. You were right to fight.",
                    orc = "The warlord's land is yours — good plunder, good ground. Other warbands smell the blood and keep their distance. You're not raiding anymore. You're conquering. The shamans say the land itself is watching now.",
                    undead = "The warlord crumbles. His territory and its dead now answer to your will. The living flee at your approach. Good. Fear is more useful than loyalty. The dark magic that raised you grows stronger with every domain you claim.",
                    drake = "The warlord's territory burns behind you. Your flight circles the conquered land and roars. This is more than a raid now — this is a campaign. The nesting grounds will be vast by the time you're done.",
                    knalgan = "The warlord's vault was disappointing, but the territory? That's the real prize. Toll roads, mining rights, trade routes — your company's ledger is looking healthy. Other outfits are starting to ask about merger terms. You decline.",
                }
                local act3 = {
                    loyalist = "Two warlords down. The remaining lords scatter or bend the knee. The road to the capital lies open — and with it, the source of the corruption. The king's court awaits. Whatever sits on that throne, it isn't the man who built this kingdom.",
                    elf = "Two warlords broken. The human lands grow quieter, but the sickness at the heart of the kingdom still seeps into the forest. The capital is the source. The elders will not approve of what comes next. You march anyway.",
                    orc = "Two warlords crushed. The lowlands are yours. But the shamans won't shut up about the curse, about the sick land, about the human king rotting on his throne. Fine. If killing a king is what it takes to make the hunting grounds healthy again, you'll kill a king.",
                    undead = "Two warlords destroyed. Their domains are silent. The dark magic that animates you pulses stronger the closer you get to the capital — the source of the corruption that gave you this half-life. The king's court calls to you. Whether to end the curse or claim its power... that remains to be seen.",
                    drake = "Two warlords' territories conquered. The flight has never been stronger. But the land below is dying — the rivers taste wrong, the thermals carry ash. The humans say their king is cursed. Whatever poisons this land poisons your nesting grounds too. The capital must fall.",
                    knalgan = "Two warlords out of business. Half the kingdom pays tribute to your company now. But the mines still produce foul ore and the trade roads still carry sick travelers from the capital. Bad for business. Time to fix the problem at the source — even if the source is a king.",
                }

                local text
                if bn == 6 then text = act2[fac] or act2.loyalist
                elseif bn == 11 then text = act3[fac] or act3.loyalist
                end

                if text then
                    wesnoth.wml_actions.message{
                        speaker="narrator", image="wesnoth-icon.png",
                        message=text,
                    }
                end
            >>
        [/lua]

        [endlevel]
            result = victory
            next_scenario = roguelite_path_choice
            bonus = no
            carryover_percentage = 100
            carryover_report = no
            linger_mode = no
            carryover_add = yes
        [/endlevel]
    [/event]
[/scenario]
