#textdomain wesnoth-Wesnoth_Roguelite

[scenario]
    id = roguelite_character_select
    name = _"Choose Your Champion"
    next_scenario = roguelite_path_choice

    map_file = tavern.map
    turns = 1
    victory_when_enemies_defeated = no

    [side]
        side = 1
        controller = human
        hidden = yes
        [leader]
            id = hero
            type = Spearman
            canrecruit = yes
        [/leader]
    [/side]

    [event]
        name = prestart

        [lua]
            code = <<
                local UI = wesnoth.dofile("~add-ons/Wesnoth_Roguelite/lua/roguelite_ui.lua")
                local unlocked = wesnoth.get_variable("factions_unlocked") or "loyalist,elf,orc"

                local function unit_img(utype)
                    local ut = wesnoth.unit_types[utype]
                    return ut and ut.image or ""
                end

                local factions = {
                    {key="loyalist", name="Loyalists", desc="Versatile humans with strong infantry and magic.",
                     leaders={"Lieutenant","Swordsman","Pikeman","Javelineer","Shock Trooper","Longbowman","White Mage","Red Mage"},
                     intro="The kingdom has no law. Not anymore. The king sits in his hall and does nothing while his lords tear the countryside apart fighting over scraps. Every village is someone's territory. Every road is a toll.\n\nYou started as a sellsword — just another blade for hire in a land full of them. But you're good at it, and people have started to notice. Might as well see where that takes you."},
                    {key="elf", name="Elves", desc="Swift woodland warriors with ranged precision.",
                     leaders={"Elvish Captain","Elvish Hero","Elvish Ranger","Elvish Marksman","Elvish Druid","Elvish Sorceress","Elder Wose"},
                     intro="The humans are killing each other again. Normally that's not your problem, but their war is spilling into the forest. Refugees, raiders, deserters — all of them trampling through lands that aren't theirs.\n\nThe elders say to wait it out. You say the elders haven't seen what a warband does to a village. You'll carve out enough territory to keep your people safe. And if that means fighting every petty warlord between here and the capital, so be it."},
                    {key="orc", name="Northerners", desc="Brutal orcs and goblins. Cheap and aggressive.",
                     leaders={"Orcish Warrior","Troll","Troll Rocklobber","Orcish Crossbowman","Orcish Slayer"},
                     intro="There's good plunder in the lowlands right now. The humans are too busy fighting each other to guard their towns properly. You've gathered a warband — orcs, goblins, a few trolls who were hungry enough to follow.\n\nThe plan is simple: raid, take what you need, get strong. The shamans mutter about some curse on the human king, about the land itself being sick. You don't care about curses. You care about spoils."},
                    {key="undead", name="Undead", desc="Tireless hordes that fight best at night.",
                     leaders={"Dark Sorcerer","Revenant","Deathblade","Bone Shooter","Necrophage"},
                     intro="You woke in a shallow grave with no memory of how you got there. The land is full of the restless dead — raised by dark magic that seeps from the capital like a plague. You are one of them, but something went wrong. Or right. You can think. You can choose.\n\nMost of the dead just wander and kill. You intend to do more than that. There's power to be had in this broken land, and the dead don't tire."},
                    {key="drake", name="Drakes", desc="Powerful flying lizardfolk with fire attacks.",
                     leaders={"Drake Flare","Fire Drake","Drake Arbiter","Drake Thrasher","Drake Warrior","Saurian Oracle"},
                     intro="The lowlands are in chaos, and chaos means opportunity. Your flight was driven from the nesting grounds by a rival clan, and you need territory. The humans are weak and divided — their king does nothing while his people tear each other apart.\n\nA strong flight could carve out a domain here. Burn the warbands, claim the land, build a new roost. The humans can sort out their own problems. You have eggs to protect."},
                    {key="knalgan", name="Knalgan Alliance", desc="Tough dwarves and cunning outlaws.",
                     leaders={"Dwarvish Steelclad","Dwarvish Thunderguard","Dwarvish Stalwart","Rogue","Trapper"},
                     intro="The mines aren't producing like they used to. Something in the water, something in the stone — the old tunnels feel wrong. Meanwhile, the surface world is a mess. Every two-bit warlord with a sword thinks he's a king, and the actual king can't be bothered to stop them.\n\nThere's money to be made in that kind of disorder. You've put together a company — dwarven steel and human cunning. Time to go make some."},
                }

                local available = {}
                for _, f in ipairs(factions) do
                    if unlocked:find(f.key) then table.insert(available, f) end
                end

                local chosen_faction, chosen_leader, hero_name
                local step = 1

                while true do
                    if step == 1 then
                        local opts = {}
                        for _, f in ipairs(available) do
                            table.insert(opts, {image=unit_img(f.leaders[1]), label=f.name, description=f.desc})
                        end
                        local pick = UI.choose{title="Choose Your Faction", message="Select the faction you will lead into battle.", options=opts}
                        chosen_faction = available[pick]
                        step = 2

                    elseif step == 2 then
                        local opts = {}
                        for _, l in ipairs(chosen_faction.leaders) do
                            table.insert(opts, {image=unit_img(l), label=l})
                        end
                        table.insert(opts, "← Back")
                        local pick = UI.choose{title="Choose Your Leader", message="Select your starting leader for the " .. chosen_faction.name .. ".", options=opts}
                        if pick > #chosen_faction.leaders then
                            step = 1
                        else
                            chosen_leader = chosen_faction.leaders[pick]
                            step = 3
                        end

                    elseif step == 3 then
                        local text, btn = UI.text_input{title="Name Your Champion", message="Enter a name for your " .. chosen_leader .. ".\nLeave blank for a random name.", default_text=""}
                        if btn == 2 then
                            step = 2
                        else
                            hero_name = (text and text ~= "") and text or ""
                            if hero_name == "" then
                                -- Generate a random name based on faction
                                local names = {
                                    loyalist={"Aldric","Brennan","Cedric","Darian","Edric","Gareth","Haldric","Konrad","Lorin","Maddoc","Owyn","Roderic","Tallin","Valen"},
                                    elf={"Aethil","Caelir","Dorial","Elensar","Faelir","Galawen","Ithilwen","Kalenz","Landar","Myriael","Nelara","Quenoth","Silaren","Thalion"},
                                    orc={"Brakk","Drukk","Gashnak","Grukk","Krazak","Mugash","Nargul","Orghak","Ruzgash","Skullcrag","Thrakk","Urgash","Varguk","Zugrak"},
                                    undead={"Ashavar","Caelis","Dreadmere","Ghulrath","Hexion","Kethris","Malachar","Nethys","Ossian","Raveth","Sethric","Thaniel","Umbral","Vexis"},
                                    drake={"Azkrath","Blazeclaw","Charrak","Drakkon","Embris","Fyrath","Grythak","Ignaar","Kethrak","Pyraxis","Scaldris","Thyrax","Vyreth","Zephrak"},
                                    knalgan={"Balin","Durgrim","Fargrim","Grimbold","Harek","Keldorn","Mordin","Norgrim","Olfin","Rurik","Stonehelm","Thorin","Ulfgar","Wulfric"},
                                }
                                local pool = names[chosen_faction.key] or names.loyalist
                                hero_name = pool[wesnoth.random(1, #pool)]
                            end
                            step = 4
                        end

                    elseif step == 4 then
                        local article = chosen_leader:match("^[AEIOUaeiou]") and "an" or "a"
                        local pick = UI.choose{
                            title="Confirm",
                            message="You have chosen <b>" .. hero_name .. "</b>, " .. article .. " <b>" .. chosen_leader .. "</b> of the <b>" .. chosen_faction.name .. "</b>.\n\nReady to begin?",
                            options={"Continue", "← Back"},
                        }
                        if pick == 2 then
                            step = 3
                        else
                            -- Show faction intro as story screen
                            local bg = {
                                loyalist="story/landscape-castle.webp",
                                elf="story/grim-altar.jpg",
                                orc="story/landscape-mountains-01.webp",
                                undead="story/landscape-battlefield_nohumans.webp",
                                drake="story/landscape-mountains-05.webp",
                                knalgan="story/landscape-mountains-04.webp",
                            }
                            local story_title = {
                                loyalist="The Broken Kingdom",
                                elf="The Fading Forest",
                                orc="Blood and Plunder",
                                undead="The Restless Dead",
                                drake="Wings of Conquest",
                                knalgan="Fortune and Steel",
                            }
                            gui.show_story({
                                wml.tag.part{
                                    background=bg[chosen_faction.key] or "story/landscape-plain.webp",
                                    story=chosen_faction.intro,
                                    title=story_title[chosen_faction.key] or chosen_faction.name,
                                    show_title=true,
                                },
                            }, story_title[chosen_faction.key] or chosen_faction.name)
                            break
                        end
                    end
                end

                wesnoth.set_variable("chosen_faction", chosen_faction.key)
                wesnoth.set_variable("hero_type", chosen_leader)
                wesnoth.set_variable("hero_name", hero_name)
            >>
        [/lua]

        [endlevel]
            result = victory
            next_scenario = roguelite_path_choice
            bonus = no
            carryover_percentage = 0
            carryover_report = no
            linger_mode = no
        [/endlevel]
    [/event]
[/scenario]
