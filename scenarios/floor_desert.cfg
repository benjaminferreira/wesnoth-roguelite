#textdomain wesnoth-Wesnoth_Roguelite
[scenario]
    id = roguelite_battle_desert
    name = _"Conquest"
    next_scenario = roguelite_path_choice
    map_generation = lua
    [generator]
        id = mapgen_desert
        config_name = _"Desert"
        create_map = << return wesnoth.dofile("~add-ons/Wesnoth_Roguelite/lua/mapgen_desert.lua") >>
