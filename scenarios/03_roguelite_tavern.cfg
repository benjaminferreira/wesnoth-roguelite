#textdomain wesnoth-Wesnoth_Roguelite

[scenario]
    id = roguelite_tavern
    name = _"The Tavern"
    next_scenario = roguelite_path_choice

    map_file = tavern.map
    turns = 1
    victory_when_enemies_defeated = no

    [side]
        side = 1
        controller = human
        hidden = yes
        gold = 0
        [leader]
            id = hero
            type = Spearman
            canrecruit = yes
        [/leader]
    [/side]

    [event]
        name = prestart

        [lua]
            code = <<
                local UI = wesnoth.dofile("~add-ons/Wesnoth_Roguelite/lua/roguelite_ui.lua")
                local DEBUG_BN = nil

                local bn = DEBUG_BN or wesnoth.get_variable("battle_number") or 1
                local renown = wesnoth.get_variable("renown") or 0
                local faction = wesnoth.get_variable("chosen_faction") or "loyalist"

                local function unit_img(utype)
                    local ut = wesnoth.unit_types[utype]
                    return ut and ut.image or ""
                end

                local function plural(name)
                    if name:sub(-2) == "an" then return name
                    elseif name:sub(-1) == "s" then return name
                    elseif name:sub(-1) == "f" then return name:sub(1,-2) .. "ves"
                    elseif name:sub(-2) == "ch" then return name .. "es"
                    elseif name:sub(-2) == "sh" then return name .. "es"
                    elseif name:sub(-1) == "x" then return name .. "es"
                    elseif name:sub(-3) == "man" then return name:sub(1,-4) .. "men"
                    elseif name:sub(-1) == "y" and not ("aeiou"):find(name:sub(-2,-2), 1, true) then
                        return name:sub(1,-2) .. "ies"
                    else return name .. "s"
                    end
                end

                local function renown_str()
                    local s = "\n\n<small><b>Renown:</b> " .. renown

                    -- Recall list
                    local ok, recall_units = pcall(wesnoth.units.find_on_recall, {side=1})
                    if ok and recall_units and #recall_units > 0 then
                        local counts = {}
                        local order = {}
                        for _, u in ipairs(recall_units) do
                            if u.id ~= "hero" then
                                local t = u.type
                                if not counts[t] then counts[t] = 0; table.insert(order, t) end
                                counts[t] = counts[t] + 1
                            end
                        end
                        if #order > 0 then
                            s = s .. "\n\n<b>Recall List:</b>"
                            for _, t in ipairs(order) do
                                s = s .. "\n  " .. t .. (counts[t] > 1 and (" x" .. counts[t]) or "")
                            end
                        end
                    end

                    -- Current recruit pool
                    local side = wesnoth.sides[1]
                    if side then
                        local recruits = side.recruit
                        if type(recruits) == "table" and #recruits > 0 then
                            s = s .. "\n\n<b>Recruit Pool:</b>"
                            for _, r in ipairs(recruits) do
                                s = s .. "\n  " .. r
                            end
                        elseif type(recruits) == "string" and recruits ~= "" then
                            s = s .. "\n\n<b>Recruit Pool:</b>"
                            for r in recruits:gmatch("[^,]+") do
                                s = s .. "\n  " .. r:match("^%s*(.-)%s*$")
                            end
                        end
                    end

                    return s .. "</small>"
                end

                -- WANDERER SETUP: tier 1 = L1, tier 2 = L2, tier 3 = L3
                local wand_lvl = 1
                if bn > 10 then wand_lvl = 3
                elseif bn > 5 then wand_lvl = 2 end

                local wand_types = {
                    {type="Spearman",lvl=1,cost=1},{type="Bowman",lvl=1,cost=1},
                    {type="Fencer",lvl=1,cost=1},{type="Cavalryman",lvl=1,cost=1},
                    {type="Elvish Fighter",lvl=1,cost=1},{type="Elvish Archer",lvl=1,cost=1},
                    {type="Orcish Grunt",lvl=1,cost=1},{type="Wolf Rider",lvl=1,cost=1},
                    {type="Dwarvish Fighter",lvl=1,cost=1},{type="Dwarvish Thunderer",lvl=1,cost=1},
                    {type="Drake Fighter",lvl=1,cost=1},{type="Skeleton Archer",lvl=1,cost=1},
                    {type="Thief",lvl=1,cost=1},{type="Footpad",lvl=1,cost=1},
                    {type="Swordsman",lvl=2,cost=1},{type="Pikeman",lvl=2,cost=1},
                    {type="Longbowman",lvl=2,cost=1},{type="Dragoon",lvl=2,cost=1},
                    {type="Knight",lvl=2,cost=1},{type="Red Mage",lvl=2,cost=1},
                    {type="Elvish Ranger",lvl=2,cost=1},{type="Elvish Rider",lvl=2,cost=1},
                    {type="Orcish Warrior",lvl=2,cost=1},{type="Orcish Crossbowman",lvl=2,cost=1},
                    {type="Dwarvish Steelclad",lvl=2,cost=1},{type="Troll",lvl=2,cost=1},
                    {type="Revenant",lvl=2,cost=1},{type="Bone Shooter",lvl=2,cost=1},
                    {type="Halberdier",lvl=3,cost=2},{type="Royal Guard",lvl=3,cost=2},
                    {type="Master Bowman",lvl=3,cost=2},{type="Cavalier",lvl=3,cost=2},
                    {type="Arch Mage",lvl=3,cost=2},{type="Silver Mage",lvl=3,cost=2},
                    {type="Elvish Sharpshooter",lvl=3,cost=2},{type="Elvish Avenger",lvl=3,cost=2},
                    {type="Orcish Warlord",lvl=3,cost=2},{type="Direwolf Rider",lvl=3,cost=2},
                    {type="Troll Warrior",lvl=3,cost=2},{type="Banebow",lvl=3,cost=2},
                }
                -- Build set of current recruitable types for filtering
                local unlocked_recruits = wesnoth.get_variable("unlocked_recruits") or ""
                local my_recruits = {}
                local side = wesnoth.sides[1]
                if side then
                    local r = side.recruit
                    if type(r) == "table" then
                        for _, t in ipairs(r) do my_recruits[t] = true end
                    elseif type(r) == "string" then
                        for t in r:gmatch("[^,]+") do my_recruits[t:match("^%s*(.-)%s*$")] = true end
                    end
                end
                -- Also include unlocked_recruits
                for t in unlocked_recruits:gmatch("[^,]+") do my_recruits[t:match("^%s*(.-)%s*$")] = true end

                local cands = {}
                for _, w in ipairs(wand_types) do
                    if w.lvl == wand_lvl then
                        -- Skip L0/L1 units the player can already recruit
                        if w.lvl >= 2 or not my_recruits[w.type] then
                            table.insert(cands, w)
                        end
                    end
                end
                local w1, w2
                if #cands >= 2 then
                    local i1 = wesnoth.random(1, #cands)
                    w1 = cands[i1]; table.remove(cands, i1)
                    w2 = cands[wesnoth.random(1, #cands)]
                elseif #cands == 1 then w1 = cands[1] end

                -- RECRUIT UNLOCK SETUP
                local tier1 = {
                    loyalist={"Horseman","Heavy Infantryman","Mage","Sergeant"},
                    elf={"Wose","Merman Hunter","Mage"},
                    orc={"Wolf Rider","Orcish Assassin","Goblin Impaler","Goblin Rouser"},
                    undead={"Ghost","Skeleton Rider","Blood Bat","Soulless"},
                    drake={"Drake Clasher","Drake Burner"},
                    knalgan={"Dwarvish Thunderer","Dwarvish Ulfserker","Gryphon Rider"},
                }
                local tier2 = {
                    loyalist={"Swordsman","Pikeman","Javelineer","Longbowman","Dragoon","Shock Trooper","White Mage","Red Mage","Lieutenant","Duelist","Knight","Lancer","Merman Warrior"},
                    elf={"Elvish Captain","Elvish Hero","Elvish Ranger","Elvish Marksman","Elvish Druid","Elvish Sorceress","Elvish Rider","Elder Wose","Merman Spearman","Merman Netcaster","White Mage","Red Mage"},
                    orc={"Orcish Warrior","Orcish Crossbowman","Orcish Slayer","Troll","Troll Rocklobber","Goblin Knight","Goblin Pillager","Naga Warrior"},
                    undead={"Revenant","Deathblade","Bone Shooter","Dark Sorcerer","Necrophage","Wraith","Shadow","Bone Knight","Dread Bat"},
                    drake={"Drake Warrior","Drake Thrasher","Drake Arbiter","Fire Drake","Drake Flare","Sky Drake","Saurian Ambusher","Saurian Oracle","Saurian Soothsayer"},
                    knalgan={"Dwarvish Steelclad","Dwarvish Thunderguard","Dwarvish Stalwart","Dwarvish Berserker","Rogue","Trapper","Outlaw","Gryphon Master","Bandit","Dwarvish Runesmith"},
                }
                local tier3 = {
                    loyalist={"Royal Guard","Halberdier","Master Bowman","Cavalier","Paladin","Grand Knight","Master at Arms","Iron Mauler","Mage of Light","Arch Mage","Silver Mage","General","Royal Warrior","Merman Triton","Merman Hoplite","Great Mage"},
                    elf={"Elvish Marshal","Elvish Champion","Elvish Avenger","Elvish Sharpshooter","Elvish Shyde","Elvish Enchantress","Elvish Outrider","Ancient Wose","Merman Javelineer","Merman Entangler","Mage of Light","Arch Mage","Silver Mage","Elvish Sylph"},
                    orc={"Orcish Warlord","Orcish Slurbow","Orcish Nightblade","Troll Warrior","Direwolf Rider","Naga Myrmidon","Great Troll"},
                    undead={"Draug","Banebow","Lich","Necromancer","Ghast","Spectre","Nightgaunt","Death Knight","Ancient Lich"},
                    drake={"Drake Blademaster","Drake Enforcer","Drake Warden","Inferno Drake","Drake Flameheart","Hurricane Drake","Saurian Flanker","Saurian Prophet","Saurian Seer","Armageddon Drake"},
                    knalgan={"Dwarvish Lord","Dwarvish Dragonguard","Dwarvish Sentinel","Assassin","Huntsman","Ranger","Fugitive","Highwayman","Dwarvish Runemaster","Dwarvish Arcanister"},
                }
                local function build_pool()
                    -- Build exact set of already-unlocked types
                    local unlocked_set = {}
                    for t in unlocked_recruits:gmatch("[^,]+") do
                        unlocked_set[t:match("^%s*(.-)%s*$")] = true
                    end
                    -- Also exclude base recruits
                    for k, _ in pairs(my_recruits) do unlocked_set[k] = true end

                    local pool = {}
                    for _, t in ipairs(tier1[faction] or {}) do
                        if not unlocked_set[t] then table.insert(pool, t) end
                    end
                    if bn > 5 then
                        for _, t in ipairs(tier2[faction] or {}) do
                            if not unlocked_set[t] then table.insert(pool, t) end
                        end
                    end
                    if bn > 10 then
                        for _, t in ipairs(tier3[faction] or {}) do
                            if not unlocked_set[t] then table.insert(pool, t) end
                        end
                    end
                    return pool
                end
                local rpool = build_pool()
                -- Tier 1: 2 options, Tier 2: 3 options, Tier 3: 4 options
                local num_recruit_options = 2
                if bn > 10 then num_recruit_options = 4
                elseif bn > 5 then num_recruit_options = 3 end

                local recruit_picks = {}
                for i = 1, num_recruit_options do
                    if #rpool == 0 then break end
                    local idx = wesnoth.random(1, #rpool)
                    table.insert(recruit_picks, rpool[idx])
                    table.remove(rpool, idx)
                end

                -- FLAVOR INTRO
                local is_pre_boss = (bn == 4 or bn == 9 or bn == 14)
                local is_post_boss = (bn == 8 or bn == 13 or bn == 18)
                local intro

                if is_post_boss then
                    local boss_title = wesnoth.get_variable("boss1_title") or "the warlord"
                    local post_boss = {
                        "Word of your victory over " .. boss_title .. " has spread. Strangers raise their cups when you walk in.",
                        "The barkeep slides you a drink. \"On the house. Anyone who brought down " .. boss_title .. " drinks free.\"",
                        "A bard in the corner is singing about the fall of " .. boss_title .. ". It's not very good, but the crowd loves it.",
                        "Soldiers from other warbands nod as you enter. Defeating " .. boss_title .. " has earned you something money can't buy — respect.",
                        "A grizzled veteran raises his mug. \"Heard about " .. boss_title .. ". Didn't think anyone had the steel for it.\"",
                        "The tavern is packed. Your victory over " .. boss_title .. " has drawn attention — some welcome, some not.",
                        "Everyone wants to hear how " .. boss_title .. " fell. You find a quiet corner, but it doesn't stay quiet long.",
                        "The keeper gives you the best table in the house. Apparently defeating " .. boss_title .. " is good for business.",
                    }
                    intro = post_boss[wesnoth.random(1, #post_boss)]
                elseif is_pre_boss then
                    local pre_boss = {
                        "The tavern is tense tonight. Everyone knows what lies ahead. You drink in silence.",
                        "Tomorrow you march on a warlord's stronghold. The tavern is quiet. Even the lute player has stopped.",
                        "A heavy silence hangs over the tavern. Your troops drink slowly, checking their weapons between sips.",
                    }
                    intro = pre_boss[wesnoth.random(1, #pre_boss)]
                else
                    local intros = {
                        "The tavern is half-empty, which is half-full by wartime standards. A fire crackles. Someone is playing a lute badly.",
                        "You find a tavern still standing — barely. The ale is warm and the roof leaks, but it's better than sleeping in the mud.",
                        "A roadside inn. The keeper eyes your warband nervously but takes your coin. The stew is questionable. The beds are worse.",
                        "The tavern smells of smoke and old beer. A cat watches you from the bar with open contempt. You order anyway.",
                        "You push through the door and the room goes quiet. Then someone recognizes you and buys a round. Word travels fast.",
                        "The inn is crowded with refugees and deserters. Nobody makes eye contact. The food is terrible but plentiful.",
                    }
                    intro = intros[wesnoth.random(1, #intros)]
                end

                UI.message{title="The Tavern", message=intro .. renown_str()}

                -- MENU LOOP
                local did_wanderer = false
                local did_recruit = false

                while true do
                    local has_w = w1 and not did_wanderer
                    local has_r = #recruit_picks > 0 and not did_recruit

                    if not has_w and not has_r then
                        local msgs = {"Nothing else to do but get some sleep. Long day ahead.","You've done what you can. Time to rest up.","The fire burns low. Tomorrow comes early."}
                        UI.message{title="The Tavern", message=msgs[wesnoth.random(1, #msgs)] .. renown_str()}
                        break
                    end

                    local opts = {}
                    local keys = {}
                    if has_w then table.insert(opts, "Talk to the wanderers"); table.insert(keys, "wand") end
                    if has_r then table.insert(opts, "Speak with the fighters calling you over"); table.insert(keys, "recruit") end
                    table.insert(opts, "Rest and leave at dawn"); table.insert(keys, "leave")

                    local pick = UI.choose{title="The Tavern", message="What would you like to do?" .. renown_str(), options=opts}
                    local action = keys[pick]

                    if action == "wand" then
                        local function wand_desc(w)
                            local ut = wesnoth.unit_types[w.type]
                            local gold = ut and ut.cost or "?"
                            if w.lvl >= 2 and ut then gold = math.max(20, math.floor(ut.cost * 0.6)) end
                            local race = ut and ut.race or ""
                            return "Level " .. w.lvl .. " " .. race .. " — Cost to recall in battle: " .. gold .. "g"
                        end
                        local wopts = {{image=unit_img(w1.type), label=w1.type .. "  [" .. w1.cost .. " Renown]", description=wand_desc(w1)}}
                        if w2 then table.insert(wopts, {image=unit_img(w2.type), label=w2.type .. "  [" .. w2.cost .. " Renown]", description=wand_desc(w2)}) end
                        table.insert(wopts, "← Back")

                        local wp = UI.choose{title="Wanderers", message="Two wanderers sit idle at the bar. Your renown could convince one to join — but only one. The other won't wait." .. renown_str(), options=wopts}
                        local chosen = wp == 1 and w1 or (wp == 2 and w2 or nil)

                        if chosen then
                            if renown >= chosen.cost then
                                renown = renown - chosen.cost
                                wesnoth.set_variable("renown", renown)
                                local u = wesnoth.units.create{type=chosen.type, side=1, generate_name=true, random_traits=true}
                                u:to_recall()
                                UI.message{title="Hired!", message="A " .. chosen.type .. " joins your warband. (-" .. chosen.cost .. " Renown)" .. renown_str()}
                                did_wanderer = true
                                local wh = wesnoth.get_variable("wanderers_hired") or 0
                                wesnoth.set_variable("wanderers_hired", wh + 1)
                            else
                                UI.message{title="The Tavern", message="You lack the renown. They shrug and return to their drink." .. renown_str()}
                            end
                        end

                    elseif action == "recruit" then
                        local cost = 2
                        local function recruit_desc(utype)
                            local ut = wesnoth.unit_types[utype]
                            local lvl = ut and ut.level or "?"
                            local gold = ut and ut.cost or "?"
                            local race = ut and ut.race or ""
                            return "Level " .. lvl .. " " .. race .. " — Cost to recruit in battle: " .. gold .. "g"
                        end
                        local ropts = {}
                        for _, rtype in ipairs(recruit_picks) do
                            table.insert(ropts, {image=unit_img(rtype), label=plural(rtype), description=recruit_desc(rtype)})
                        end
                        table.insert(ropts, "← Back")

                        local rp = UI.choose{title="New Recruits", message="New fighters seek to join your cause. Each unlock costs <b>" .. cost .. " Renown</b>." .. renown_str(), options=ropts}
                        local chosen = rp <= #recruit_picks and recruit_picks[rp] or nil

                        if chosen then
                            if renown >= cost then
                                renown = renown - cost
                                wesnoth.set_variable("renown", renown)
                                if unlocked_recruits == "" then unlocked_recruits = chosen
                                else unlocked_recruits = unlocked_recruits .. "," .. chosen end
                                wesnoth.set_variable("unlocked_recruits", unlocked_recruits)
                                wesnoth.wml_actions.allow_recruit{side=1, type=chosen}
                                UI.message{title="Unlocked!", message=plural(chosen) .. " added to your recruit roster! (-" .. cost .. " Renown)" .. renown_str()}
                                did_recruit = true
                            else
                                UI.message{title="The Tavern", message="You lack the renown. They nod politely and move on." .. renown_str()}
                            end
                        end

                    elseif action == "leave" then
                        UI.message{title="The Tavern", message="You rest for the night and head out at dawn." .. renown_str()}
                        break
                    end
                end
            >>
        [/lua]

        {VARIABLE last_scenario_type "tavern"}

        [endlevel]
            result = victory
            next_scenario = roguelite_path_choice
            bonus = no
            carryover_percentage = 100
            carryover_report = no
            linger_mode = no
            carryover_add = yes
        [/endlevel]
    [/event]
[/scenario]
