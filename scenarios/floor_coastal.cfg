#textdomain wesnoth-Wesnoth_Roguelite
[scenario]
    id = roguelite_battle_coastal
    name = _"Conquest"
    next_scenario = roguelite_path_choice
    map_generation = lua
    [generator]
        id = mapgen_coastal
        config_name = _"Coastal"
        create_map = << return wesnoth.dofile("~add-ons/Wesnoth_Roguelite/lua/mapgen_coastal.lua") >>
    [/generator]
    {DEFAULT_SCHEDULE}
    victory_when_enemies_defeated = yes
    {SCENARIO_MUSIC "elvish-theme.ogg"}
    {ROGUELITE_FLOOR_SIDES}
    {ROGUELITE_FLOOR_EVENTS}
[/scenario]
