#textdomain wesnoth-Wesnoth_Roguelite

# Boss 1 scenario — Battle 5
[scenario]
    id = roguelite_boss1
    name = _"Conquest — Battle $battle_number| — $boss1_title"
    next_scenario = roguelite_path_choice

    map_file = boss1_greyhelm.map
    turns = 30
    victory_when_enemies_defeated = yes

    {DEFAULT_SCHEDULE}

    {ROGUELITE_FLOOR_EVENTS}

    # Side definitions (floor_common also defines sides — these are the boss-specific overrides)
    [side]
        side = 1
        controller = human
        team_name = player
        user_team_name = _"Roguelite"
        fog = no
        gold = 100
        village_gold = 2
        [leader]
            id = hero
            type = $hero_type
            canrecruit = yes
        [/leader]
    [/side]

    [side]
        side = 2
        controller = ai
        team_name = enemy
        user_team_name = _"Enemy"
        # NOTE: use a placeholder leader (like floor_common does) so the AI
        # initializes properly. The boss prestart kills this and creates the real boss.
        gold = 0
        [leader]
            id = floor_boss_placeholder
            type = Spearman
            canrecruit = yes
        [/leader]
        [ai]
            aggression = 1.0
            caution = 0.0
            village_value = 10
        [/ai]
    [/side]

    [side]
        side = 3
        controller = ai
        team_name = hostile
        user_team_name = _"Hostile"
        no_leader = yes
        gold = 0
        hidden = yes
    [/side]

    [event]
        name = prestart

        [lua]
            code = <<
                -- Remove placeholder leaders (from floor_common and boss side def)
                wesnoth.wml_actions.kill{id="floor_boss", fire_event=false}
                wesnoth.wml_actions.kill{id="floor_boss_placeholder", fire_event=false}

                -- Fix hero type/name only if carryover failed (hero is still the [side] placeholder)
                local hero = wesnoth.units.find_on_map{id="hero"}[1]
                if hero then
                    local ht = wesnoth.get_variable("hero_type") or ""
                    local hn = wesnoth.get_variable("hero_name") or ""
                    -- Only transform if hero is the placeholder Spearman from [side]
                    if ht ~= "" and hero.type == "Spearman" then
                        hero:transform(ht)
                    end
                    if hn ~= "" then hero.name = hn end
                end

                local B1 = wesnoth.dofile("~add-ons/Wesnoth_Roguelite/lua/boss1.lua")
                local boss

                -- Debug override
                local debug_id = wesnoth.get_variable("debug_boss_id") or ""
                if debug_id ~= "" then
                    for _, b in ipairs(B1.bosses) do
                        if b.id == debug_id then boss = b; break end
                    end
                    wesnoth.set_variable("debug_boss_id", "")
                end
                if not boss then boss = B1.pick_boss() end

                -- Store boss info
                wesnoth.set_variable("current_enemy_leader", boss.name)
                wesnoth.set_variable("current_enemy_faction", boss.faction)
                wesnoth.set_variable("boss1_id", boss.id)
                wesnoth.set_variable("boss1_title", boss.title or boss.name)
                wesnoth.set_variable("current_territory_name", boss.name .. "'s Domain")

                -- Fog for Pale Conductor
                if boss.id == "pale_conductor" then
                    wesnoth.wml_actions.modify_side{side=1, fog=true}
                end

                -- Maggash: flag for dusk start (handled in WML below)
                if boss.id == "maggash" then
                    wesnoth.set_variable("boss_dusk_start", "yes")
                end

                -- Replace map to match boss (skip if already correct)
                if boss.map ~= "boss1_greyhelm.map" then
                    local map_str = wesnoth.read_file("~add-ons/Wesnoth_Roguelite/maps/" .. boss.map)
                    if map_str then
                        wesnoth.wml_actions.replace_map{map_data=map_str, expand=true, shrink=true}
                        -- Relocate hero to new keep
                        local p1keep = wesnoth.special_locations["1"]
                        if p1keep then
                            local hero = wesnoth.units.find_on_map{id="hero"}[1]
                            if hero then hero:to_map(p1keep[1], p1keep[2]) end
                        end
                    end
                end

                -- Economy scaling
                local bn = wesnoth.get_variable("battle_number") or 5
                local side1 = wesnoth.sides[1]
                side1.base_income = math.floor(1.5 * (bn - 1))
                side1.village_support = 1 + (bn - 1)

                -- Set side 1 recruit list
                local base_recruits = {
                    loyalist = "Spearman,Bowman,Cavalryman,Fencer,Merman Fighter",
                    elf = "Elvish Fighter,Elvish Archer,Elvish Shaman,Elvish Scout",
                    orc = "Orcish Grunt,Orcish Archer,Troll Whelp,Naga Fighter,Goblin Spearman",
                    undead = "Skeleton,Skeleton Archer,Walking Corpse,Vampire Bat,Dark Adept,Ghoul",
                    drake = "Drake Fighter,Drake Glider,Saurian Skirmisher,Saurian Augur",
                    knalgan = "Dwarvish Fighter,Dwarvish Guardsman,Thief,Poacher,Footpad",
                }
                local faction = wesnoth.get_variable("chosen_faction") or "loyalist"
                wesnoth.wml_actions.set_recruit{side=1, recruit=base_recruits[faction] or base_recruits.loyalist}
                local unlocked = wesnoth.get_variable("unlocked_recruits") or ""
                if unlocked ~= "" then
                    for utype in unlocked:gmatch("[^,]+") do
                        wesnoth.wml_actions.allow_recruit{side=1, type=utype:match("^%s*(.-)%s*$")}
                    end
                end

                -- Recall cost scaling
                for _, unit in ipairs(wesnoth.units.find_on_recall{side=1}) do
                    if unit.level <= 1 then
                        unit.recall_cost = unit.__cfg.cost
                    else
                        unit.recall_cost = math.max(20, math.floor(unit.__cfg.cost * 0.6))
                    end
                end

                -- Set up side 2 leader
                local keep = wesnoth.special_locations["2"]
                if keep then
                    keep = {keep[1], keep[2]}
                else
                    -- No side 2 start — place on right side
                    local m = wesnoth.current.map
                    keep = {m.playable_width - 3, math.floor(m.playable_height / 2)}
                end
                local leader = wesnoth.units.create{
                    type = boss.type, side = 2, id = "boss1_leader",
                    name = boss.name, canrecruit = true,
                    generate_name = false, random_traits = true,
                }
                leader:to_map(keep[1], keep[2])
                -- Verify placement
                if not wesnoth.units.find_on_map{id="boss1_leader"}[1] then
                    leader:to_map(20, 10)
                end

                -- Apply random traits (engine skips leaders with canrecruit)
                local TU = wesnoth.dofile("~add-ons/Wesnoth_Roguelite/lua/trait_utils.lua")
                TU.apply_random_traits(leader)
                leader.hitpoints = leader.max_hitpoints

                -- Set gold, income, and recruits for side 2
                wesnoth.sides[2].gold = boss.gold
                wesnoth.sides[2].base_income = boss.base_income or 0
                wesnoth.sides[2].village_gold = boss.village_gold or 1
                if boss.turns then
                    wesnoth.game_config.last_turn = boss.turns
                end
                if #boss.recruits > 0 then
                    wesnoth.wml_actions.set_recruit{side=2, recruit=table.concat(boss.recruits, ",")}
                end

                -- === BOSS-SPECIFIC SETUP ===

                -- Greyhelm: movement 0, pre-placed guardians on castle
                if boss.ai == "guardian" then
                    leader.moves = 0
                    leader.max_moves = 0
                end

                -- Greyhelm: lock movement to 0, steadfast
                if boss.ai == "guardian" then
                    wesnoth.wml_actions.object{
                        silent = true,
                        wml.tag.filter{id="boss1_leader"},
                        wml.tag.effect{apply_to="movement", set=0},
                    }
                    wesnoth.wml_actions.object{
                        silent = true,
                        wml.tag.filter{id="boss1_leader"},
                        wml.tag.effect{
                            apply_to = "new_ability",
                            wml.tag.abilities{
                                wml.tag.resistance{
                                    id = "steadfast",
                                    multiply = 2,
                                    max_value = 50,
                                    active_on = "defense",
                                    apply_to = "self",
                                    name = "steadfast",
                                    description = "This unit's resistances are doubled when defending, up to 50%.",
                                },
                            },
                        },
                    }
                end


                -- Regeneration (Thornweaver)
                if boss.abilities and boss.abilities[1] == "regenerate" then
                    wesnoth.wml_actions.object{
                        silent = true,
                        wml.tag.filter{id="boss1_leader"},
                        wml.tag.effect{
                            apply_to = "new_ability",
                            wml.tag.abilities{
                                wml.tag.regenerate{
                                    value = 8, id = "boss_regen",
                                    name = "regenerates",
                                    description = "Regenerates 8 HP per turn.",
                                },
                            },
                        },
                    }
                end

                -- Aggressive AI (Gutripper)
                if boss.ai == "aggressive" then
                    wesnoth.wml_actions.modify_side{side=2, wml.tag.ai{
                        aggression=1.0, caution=0.0,
                        leader_ignores_keep="yes",
                    }}
                end

                -- Pre-placed guardian units (Greyhelm) — hardcoded relative to keep
                if boss.pre_placed and not boss.pre_placed_horde and boss.gold > 0 then
                    local kx, ky = keep[1], keep[2]
                    local positions = {
                        {kx,     ky + 1}, -- White Mage (directly below keep)
                        {kx - 1, ky + 2}, -- Pikeman left
                        {kx + 1, ky + 2}, -- Pikeman right
                    }
                    for i, pp in ipairs(boss.pre_placed) do
                        if positions[i] then
                            local px, py = positions[i][1], positions[i][2]
                            local u = wesnoth.units.create{type=pp.type, side=2, generate_name=true, random_traits=true}
                            u:to_map(px, py)
                            wesnoth.wml_actions.object{
                                silent = true,
                                wml.tag.filter{x=px, y=py},
                                wml.tag.effect{apply_to="movement", set=0},
                            }
                        end
                    end
                    wesnoth.wml_actions.modify_side{side=2, wml.tag.ai{
                        aggression=1.0, caution=0.0,
                        village_value=10,
                    }}

                    -- Per-boss AI tuning
                    if boss.id == "greyhelm" then
                        -- Castle is on a water island; AI units camp there
                        -- unless we tell them to avoid it. Use terrain filter
                        -- for castle/keep hexes so recruited units leave.
                        wesnoth.wml_actions.modify_side{side=2, wml.tag.ai{
                            wml.tag.avoid{terrain="Ch,Kh,Ch^*,Kh^*"},
                        }}
                    elseif boss.id == "briarwen" then
                        wesnoth.wml_actions.modify_side{side=2, wml.tag.ai{
                            aggression=0.8, caution=0.1,
                        }}
                    elseif boss.id == "pale_conductor" then
                        wesnoth.wml_actions.modify_side{side=2, wml.tag.ai{
                            aggression=0.9, caution=0.0,
                        }}
                    elseif boss.id == "sithrak" then
                        wesnoth.wml_actions.modify_side{side=2, wml.tag.ai{
                            aggression=0.6, caution=0.3,
                        }}
                    elseif boss.id == "ironband" then
                        wesnoth.wml_actions.modify_side{side=2, wml.tag.ai{
                            aggression=0.4, caution=0.6, grouping=0.8,
                            village_value=8,
                        }}
                    end
                end

                -- Ironband's champions: cluster in northern mountains
                if boss.pre_placed and boss.gold == 0 and not boss.pre_placed_horde then
                    local map = wesnoth.current.map
                    local w, h = map.playable_width, map.playable_height
                    -- Place near the boss keep in the northern half
                    local kx, ky = keep[1], keep[2]
                    local positions = {
                        {kx - 3, ky},
                        {kx + 3, ky},
                        {kx - 1, ky + 2},
                        {kx + 1, ky + 2},
                    }
                    for i, pp in ipairs(boss.pre_placed) do
                        local pos = positions[i]
                        if pos then
                            local u = wesnoth.units.create{
                                type=pp.type, side=2, random_traits=true,
                                name=pp.name or nil,
                                generate_name=(pp.name == nil),
                            }
                            u:to_map(pos[1], pos[2])
                        end
                    end
                end

                -- Gutripper's goblin horde — formation
                if boss.pre_placed_horde then
                    local map = wesnoth.current.map
                    local w, h = map.playable_width, map.playable_height
                    local midY = math.ceil(h / 2)

                    local function place(utype, x, y)
                        x = math.max(1, math.min(w, x))
                        y = math.max(1, math.min(h, y))
                        if not wesnoth.units.get(x, y) then
                            wesnoth.units.create{type=utype, side=2, generate_name=true, random_traits=true}:to_map(x, y)
                            return true
                        end
                        local a,b,c,d,e,f = wesnoth.map.get_adjacent_hexes(x, y)
                        for _, loc in ipairs({a,b,c,d,e,f}) do
                            if loc[1] >= 1 and loc[1] <= w and loc[2] >= 1 and loc[2] <= h and not wesnoth.units.get(loc[1], loc[2]) then
                                wesnoth.units.create{type=utype, side=2, generate_name=true, random_traits=true}:to_map(loc[1], loc[2])
                                return true
                            end
                        end
                        return false
                    end

                    -- Mixed front mob: spearmen with some impalers/rousers mixed in
                    -- Spread across rows midY-5 to midY+5, columns at 65-70% of map
                    local frontX = math.floor(w * 0.65)
                    local mob = {
                        "Goblin Spearman","Goblin Spearman","Goblin Spearman","Goblin Spearman",
                        "Goblin Spearman","Goblin Impaler","Goblin Spearman","Goblin Rouser",
                        "Goblin Spearman","Goblin Spearman","Goblin Impaler","Goblin Spearman",
                    }
                    for i, utype in ipairs(mob) do
                        local row = midY - 5 + (i - 1)
                        local col = frontX + wesnoth.random(0, 1)
                        -- Skip a row occasionally for gaps
                        if wesnoth.random(1, 5) == 1 then row = row + 1 end
                        place(utype, col, row)
                    end

                    -- Back ranks: remaining impalers and rousers, slightly spread
                    local backX = frontX + 3
                    local backs = {
                        "Goblin Impaler","Goblin Impaler","Goblin Impaler","Goblin Impaler",
                        "Goblin Rouser","Goblin Rouser","Goblin Rouser","Goblin Rouser",
                        "Goblin Rouser","Goblin Spearman","Goblin Spearman","Goblin Spearman",
                    }
                    for i, utype in ipairs(backs) do
                        local row = midY - 5 + (i - 1) + wesnoth.random(0, 1)
                        local col = backX + wesnoth.random(0, 1)
                        place(utype, col, row)
                    end

                    -- Wolves: spread behind, not adjacent to each other
                    local wolfX = backX + 4
                    place("Wolf Rider", wolfX, midY - 3)
                    place("Wolf Rider", wolfX + 1, midY)
                    place("Wolf Rider", wolfX, midY + 3)

                    -- Maggash: behind wolves
                    leader:to_map(wolfX + 2, midY)
                end

                -- Berserk (Gutripper) — remove melee attack, add it back with berserk
                if boss.attack_mods and boss.attack_mods.berserk then
                    local bl = wesnoth.units.find_on_map{id="boss1_leader"}[1]
                    if bl then
                        -- Remove existing melee attack
                        bl:add_modification("object", {
                            wml.tag.effect{
                                apply_to = "remove_attacks",
                                range = "melee",
                            },
                        })
                        -- Add it back with berserk
                        bl:add_modification("object", {
                            wml.tag.effect{
                                apply_to = "new_attack",
                                name = "greatsword",
                                description = "greatsword",
                                type = "blade",
                                range = "melee",
                                damage = 12,
                                number = 3,
                                icon = "attacks/greatsword.png",
                                wml.tag.specials{
                                    wml.tag.berserk{
                                        id = "berserk",
                                        name = "berserk",
                                        description = "Whether used offensively or defensively, this attack presses the engagement until one of the combatants is slain, or 30 rounds of attacks have occurred.",
                                        value = 30,
                                    },
                                },
                            },
                        })
                    end
                end

                -- DEBUG: dump final state
                local s2 = wesnoth.sides[2]
                local bl = wesnoth.units.find_on_map{id="boss1_leader"}[1]
                local fp = wesnoth.units.find_on_map{id="floor_boss"}[1]
                local fpp = wesnoth.units.find_on_map{id="floor_boss_placeholder"}[1]
                local hero = wesnoth.units.find_on_map{id="hero"}[1]
                wesnoth.wml_actions.wml_message{logger="warning", message=
                    "BOSS_DEBUG: side2.gold=" .. tostring(s2.gold)
                    .. " side2.total_income=" .. tostring(s2.total_income)
                    .. " side2.recruit=" .. table.concat(s2.recruit or {}, ",")
                    .. " | boss1_leader=" .. tostring(bl and bl.type or "NIL")
                    .. " canrecruit=" .. tostring(bl and bl.canrecruit or "NIL")
                    .. " at=" .. tostring(bl and (bl.x..","..bl.y) or "NIL")
                    .. " | floor_boss=" .. tostring(fp and fp.type or "DEAD")
                    .. " | placeholder=" .. tostring(fpp and fpp.type or "DEAD")
                    .. " | hero=" .. tostring(hero and hero.type or "NIL")
                    .. " hero_type_var=" .. tostring(wesnoth.get_variable("hero_type") or "")
                }

            >>
        [/lua]
    [/event]

    # Maggash dusk start
    [event]
        name = prestart
        [filter_condition]
            [variable]
                name = boss_dusk_start
                equals = yes
            [/variable]
        [/filter_condition]
        [replace_schedule]
            current_time = 3
            {DEFAULT_SCHEDULE}
        [/replace_schedule]
        {CLEAR_VARIABLE boss_dusk_start}
    [/event]

    # Pre-battle dialog (runs after map is visible)
    [event]
        name = start
        [lua]
            code = <<
                local DIALOG = wesnoth.dofile("~add-ons/Wesnoth_Roguelite/lua/boss1_dialog.lua")
                local boss_id = wesnoth.get_variable("boss1_id") or ""
                local faction = wesnoth.get_variable("chosen_faction") or "loyalist"
                local boss_dialog = DIALOG.dialog[boss_id]
                local fac_dialog = boss_dialog and boss_dialog[faction]
                if fac_dialog then
                    for _, line in ipairs(fac_dialog) do
                        if line[1] == "boss" then
                            wesnoth.wml_actions.message{speaker="boss1_leader", message=line[2]}
                        elseif line[1] == "hero" then
                            wesnoth.wml_actions.message{speaker="hero", message=line[2]}
                        elseif line[1] == "narrator" then
                            wesnoth.wml_actions.message{speaker="narrator", image="wesnoth-icon.png", message=line[2]}
                        end
                    end
                end
            >>
        [/lua]
    [/event]

    # === BOSS MECHANICS ===

    # Thornweaver: narrator warning when the forest begins to move
    [event]
        name = turn 3
        [filter_condition]
            [variable]
                name = boss1_id
                equals = briarwen
            [/variable]
        [/filter_condition]
        [message]
            speaker = narrator
            image = "wesnoth-icon.png"
            message = _"The trees are moving. Roots crack through stone and branches reach where none stood before. The forest is alive — and it is closing in."
        [/message]
    [/event]

    # Thornweaver: forest growth + wose spawn every 2 turns
    [event]
        name = turn refresh
        first_time_only = no
        [filter_condition]
            [variable]
                name = boss1_id
                equals = briarwen
            [/variable]
            [variable]
                name = side_number
                equals = 2
            [/variable]
        [/filter_condition]
        [lua]
            code = <<
                local map = wesnoth.current.map
                local w, h = map.playable_width, map.playable_height
                local turn = wesnoth.current.turn
                local ROW_LIMIT = 19
                local LEFT_MAX = math.floor(w * 0.2)
                local RIGHT_MIN = w - LEFT_MAX + 1

                -- Helper: is this terrain a forest tile?
                local function is_forest(t)
                    return t:find("%^Fp") or t:find("%^Fms") or t:find("%^Fet")
                end

                -- Helper: is this terrain replaceable by forest expansion?
                local function is_replaceable(t)
                    return t == "Gg" or t == "Gll" or t == "Gg^Efm" or t == "Gll^Efm"
                end

                -- Helper: count adjacent forest tiles
                local function adj_forest_count(x, y)
                    local count = 0
                    local hexes = {wesnoth.map.get_adjacent_hexes(x, y)}
                    for _, loc in ipairs(hexes) do
                        local at = tostring(wesnoth.current.map[loc] or "")
                        if is_forest(at) then count = count + 1 end
                    end
                    return count
                end

                -- Helper: pick a random forest type (mixed summer or pine)
                local function random_forest()
                    return wesnoth.random(1, 2) == 1 and "Gg^Fms" or "Gg^Fp"
                end

                -----------------------------------------------
                -- FOREST EXPANSION: 2 tiles per turn after turn 2
                -----------------------------------------------
                if turn > 2 then
                    local placed = 0
                    local row_limit = ROW_LIMIT

                    -- Try rows 1-19 first; if no valid spots, allow past 19
                    for pass = 1, 2 do
                        for _ = 1, 120 do
                            if placed >= 2 then break end
                            local x = wesnoth.random(1, w)
                            local y = wesnoth.random(1, row_limit)
                            local t = tostring(wesnoth.current.map[{x, y}] or "")
                            if is_replaceable(t) and adj_forest_count(x, y) >= 2 then
                                wesnoth.current.map[{x, y}] = random_forest()
                                placed = placed + 1
                            end
                        end
                        if placed >= 2 then break end
                        -- Pass 2: expand search to full map
                        row_limit = h
                    end
                end

                -----------------------------------------------
                -- WOSE SPAWN: 1 wose every 2 turns (odd turns)
                -----------------------------------------------
                if turn % 2 == 1 then
                    -- Min distance from any player unit
                    local MIN_DIST = 10
                    local pu = wesnoth.units.find_on_map{side=1}

                    for _ = 1, 80 do
                        -- Horizontal: left 20% or right 20%
                        local x
                        if wesnoth.random(1, 2) == 1 then
                            x = wesnoth.random(1, LEFT_MAX)
                        else
                            x = wesnoth.random(RIGHT_MIN, w)
                        end
                        local y = wesnoth.random(1, ROW_LIMIT)
                        local t = tostring(wesnoth.current.map[{x, y}] or "")

                        if is_forest(t) and not wesnoth.units.get(x, y) then
                            -- Check distance from all player units
                            local too_close = false
                            for _, u in ipairs(pu) do
                                local dist = wesnoth.map.distance_between(x, y, u.x, u.y)
                                if dist < MIN_DIST then too_close = true; break end
                            end
                            if not too_close then
                                wesnoth.units.create{type="Wose", side=2, generate_name=true, random_traits=true}:to_map(x, y)
                                break
                            end
                        end
                    end
                end
            >>
        [/lua]
    [/event]

    # Pale Conductor: corpse spawns every 2 turns on side 2 villages
    [event]
        name = turn refresh
        first_time_only = no
        [filter_condition]
            [variable]
                name = boss1_id
                equals = pale_conductor
            [/variable]
            [variable]
                name = side_number
                equals = 2
            [/variable]
        [/filter_condition]
        [lua]
            code = <<
                if wesnoth.current.turn % 2 ~= 0 then return end
                -- Find villages owned by side 2
                local map = wesnoth.current.map
                for x = 1, map.playable_width do
                    for y = 1, map.playable_height do
                        local owner = wesnoth.map.get_owner(x, y)
                        if owner == 2 then
                            local t = tostring(wesnoth.current.map[{x, y}] or "")
                            if t:find("V") and not wesnoth.units.get(x, y) then
                                wesnoth.units.create{type="Walking Corpse", side=2, generate_name=true}:to_map(x, y)
                            end
                        end
                    end
                end
            >>
        [/lua]
    [/event]

    # Embercrest: fire aura — 4 damage to adjacent enemies
    [event]
        name = turn refresh
        first_time_only = no
        [filter_condition]
            [variable]
                name = boss1_id
                equals = sithrak
            [/variable]
            [variable]
                name = side_number
                equals = 2
            [/variable]
        [/filter_condition]
        [lua]
            code = <<
                local boss = wesnoth.units.find_on_map{id="boss1_leader"}[1]
                if not boss then return end
                local a, b, c, d, e, f = wesnoth.map.get_adjacent_hexes(boss.x, boss.y)
                for _, loc in ipairs({a, b, c, d, e, f}) do
                    local u = wesnoth.units.get(loc[1], loc[2])
                    if u and u.side == 1 then
                        wesnoth.wml_actions.harm_unit{
                            wml.tag.filter{x=u.x, y=u.y},
                            amount = 4, fire_event = false,
                            animate = true, damage_type = "fire",
                        }
                    end
                end
            >>
        [/lua]
    [/event]

