#textdomain wesnoth-Wesnoth_Roguelite
[scenario]
    id = roguelite_floor_valley
    name = _"Roguelite — Valley"
    next_scenario = roguelite_path_choice
    map_generation = lua
    [generator]
        id = mapgen_valley
        config_name = _"Valley"
        create_map = << return wesnoth.dofile("~add-ons/Wesnoth_Roguelite/lua/mapgen_valley.lua") >>
