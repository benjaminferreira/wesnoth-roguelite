    # === ENCOUNTER SYSTEM ===
    # 25% chance per battle. Picks a random village hex as trigger.
    [event]
        name = prestart
        [lua]
            code = <<
                -- DEBUG: set to true to force encounters every battle
                local FORCE_ENCOUNTER = true

                -- No encounters on boss battles
                local bn = wesnoth.get_variable("battle_number") or 1
                if bn == 5 or bn == 10 or bn == 15 then
                    wesnoth.set_variable("encounter_active", "no")
                    return
                end

                -- 25% chance for encounter
                if not FORCE_ENCOUNTER and wesnoth.random(1, 4) ~= 1 then
                    wesnoth.set_variable("encounter_active", "no")
                    return
                end
                wesnoth.set_variable("encounter_active", "yes")

                -- Find all village hexes on the map
                local villages = wesnoth.map.find{terrain="*^V*"}
                if #villages == 0 then
                    -- Try alternate village terrains
                    villages = wesnoth.map.find{terrain="*^Vh,*^Vha,*^Vhh,*^Ve,*^Vd,*^Vc,*^Vct,*^Vo,*^Vda,*^Vl,*^Vu,*^Vud,*^Vhs,*^Vhr"}
                end
                if #villages == 0 then
                    wesnoth.set_variable("encounter_active", "no")
                    return
                end

                -- Pick a random village
                local v = villages[wesnoth.random(1, #villages)]
                wesnoth.set_variable("encounter_x", v[1])
                wesnoth.set_variable("encounter_y", v[2])

                -- Pick the encounter unit
                local ENC = wesnoth.dofile("~add-ons/Wesnoth_Roguelite/lua/encounter.lua")
                local bn = wesnoth.get_variable("battle_number") or 1
                local unlocked = wesnoth.get_variable("encounter_pool_unlocked") or ""
                local encountered = wesnoth.get_variable("encountered_units") or ""
                local unit = ENC.pick_unit(bn, unlocked, encountered)
                if unit then
                    wesnoth.set_variable("encounter_unit_type", unit.type)
                    -- Roll 70% friendly, 30% hostile
                    local roll = wesnoth.random(1, 10)
                    if roll <= 7 then
                        wesnoth.set_variable("encounter_friendly", 1)
                    else
                        wesnoth.set_variable("encounter_friendly", 0)
                    end
                else
                    wesnoth.set_variable("encounter_active", "no")
                end
            >>
        [/lua]
    [/event]

    # Trigger when any player unit moves onto the encounter village
    [event]
        name = moveto
        first_time_only = yes
        [filter]
            side = 1
            [filter_location]
                x = $encounter_x
                y = $encounter_y
            [/filter_location]
        [/filter]
        [if]
            [variable]
                name = encounter_active
                equals = yes
            [/variable]
            [then]
                [lua]
                    code = <<
                        local ENC = wesnoth.dofile("~add-ons/Wesnoth_Roguelite/lua/encounter.lua")
                        local utype = wesnoth.get_variable("encounter_unit_type")
                        local friendly = wesnoth.get_variable("encounter_friendly") == 1
                        local ex = wesnoth.get_variable("encounter_x")
                        local ey = wesnoth.get_variable("encounter_y")

                        -- Find an open adjacent hex to spawn on
                        local a, b, c, d, e, f = wesnoth.map.get_adjacent_hexes(ex, ey)
                        local adj = {a, b, c, d, e, f}
                        local spawn_x, spawn_y
                        for _, hex in ipairs(adj) do
                            local u = wesnoth.units.get(hex[1], hex[2])
                            if not u and wesnoth.current.map:on_board(hex) then
                                spawn_x, spawn_y = hex[1], hex[2]
                                break
                            end
                        end

                        if not spawn_x then
                            -- No open hex, skip encounter
                            return
                        end

                        -- Get dialogue
                        local dlg = ENC.get_dialogue(utype)

                        -- Always spawn as neutral third party first
                        local enc_unit = wesnoth.units.create{
                            type = utype,
                            side = 3,
                            x = spawn_x,
                            y = spawn_y,
                            id = "encounter_" .. tostring(wesnoth.random(1000, 9999)),
                            random_traits = true,
                            generate_name = true,
                        }
                        enc_unit:to_map()

                        -- Ensure side 3 is visible
                        wesnoth.wml_actions.modify_side{
                            side = 3,
                            hidden = false,
                            user_team_name = "Unknown",
                        }

                        -- Dialogue sequence
                        local enc_id = enc_unit.id
                        local hero_id = "hero"

                        -- 1. Encounter unit greeting
                        wesnoth.wml_actions.message{
                            id = enc_id,
                            message = dlg[1],
                        }
                        -- 2. Player response
                        wesnoth.wml_actions.message{
                            id = hero_id,
                            message = dlg[2],
                        }
                        -- 3. Resolution — switch side based on outcome
                        if friendly then
                            wesnoth.wml_actions.message{
                                id = enc_id,
                                message = dlg[3],
                            }
                            -- Switch to player side as loyal
                            wesnoth.wml_actions.modify_unit{
                                wml.tag.filter{id=enc_id},
                                side = 1,
                            }
                            -- Add loyal trait
                            local u = wesnoth.units.find{id=enc_id}[1]
                            if u then
                                u:add_modification("trait", {
                                    id = "loyal",
                                    male_name = "loyal",
                                    female_name = "loyal",
                                    description = "Zero upkeep",
                                    wml.tag.effect{apply_to="loyal"},
                                    wml.tag.effect{
                                        apply_to = "overlay",
                                        add = "misc/loyal-icon.png",
                                    },
                                })
                            end
                            wesnoth.wml_actions.modify_side{
                                side = 3,
                                hidden = true,
                            }
                        else
                            wesnoth.wml_actions.message{
                                id = enc_id,
                                message = dlg[4],
                            }
                            -- Stays as hostile side 3
                        end

                        -- Mark encounter as consumed and track unit type for this run
                        wesnoth.set_variable("encounter_active", "no")
                        local prev = wesnoth.get_variable("encountered_units") or ""
                        if prev == "" then
                            wesnoth.set_variable("encountered_units", utype)
                        else
                            wesnoth.set_variable("encountered_units", prev .. "," .. utype)
                        end
                    >>
                [/lua]
            [/then]
        [/if]
    [/event]

    [event]
        name = victory
        [if]
            [variable]
                name = hero_died
                not_equals = yes
            [/variable]
            [then]
                {VARIABLE_OP floors_cleared add 1}

                # Track last battle context for path choice flavor
                {VARIABLE last_enemy_leader $current_enemy_leader}
                {VARIABLE last_territory_name $current_territory_name}

                # Track territories won
                [if]
                    [variable]
                        name = territories_won
                        equals = ""
                    [/variable]
                    [then]
                        {VARIABLE territories_won $current_territory_name}
                    [/then]
                    [else]
                        [set_variable]
                            name = territories_won
                            value = "$territories_won, $current_territory_name"
                        [/set_variable]
                    [/else]
                [/if]

                # Award renown (1 normal, 3 boss)
                {VARIABLE_OP renown add 1}

                # Fast win bonus: +1 renown if victory before turn 12
                [lua]
                    code = <<
                        if wesnoth.current.turn < 12 then
                            local r = wesnoth.get_variable("renown") or 0
                            wesnoth.set_variable("renown", r + 1)
                            local msgs = {
                                "Swift victory! (+1 bonus Renown)",
                                "A decisive win. Word of your efficiency spreads. (+1 bonus Renown)",
                                "The enemy barely had time to muster. Your reputation grows. (+1 bonus Renown)",
                                "Quick and clean. The troops are impressed. (+1 bonus Renown)",
                                "That was over before it started. (+1 bonus Renown)",
                                "Victory before the sun moved. Bards will sing of this. (+1 bonus Renown)",
                                "No wasted time, no wasted lives. A commander's victory. (+1 bonus Renown)",
                            }
                            wesnoth.wml_actions.message{
                                speaker="narrator", image="wesnoth-icon.png",
                                message=msgs[wesnoth.random(1, #msgs)],
                            }
                        end
                    >>
                [/lua]

                # Boss battles (5, 10, 15) award extra renown + gold
                [if]
                    [variable]
                        name = battle_number
                        equals = 5
                    [/variable]
                    [or]
                        [variable]
                            name = battle_number
                            equals = 10
                        [/variable]
                    [/or]
                    [or]
                        [variable]
                            name = battle_number
                            equals = 15
                        [/variable]
                    [/or]
                    [then]
                        {VARIABLE_OP renown add 2}
                        {VARIABLE last_scenario_type "boss"}
                        # Track boss name
                        [if]
                            [variable]
                                name = bosses_slain
                                equals = ""
                            [/variable]
                            [then]
                                {VARIABLE bosses_slain $current_enemy_leader}
                            [/then]
                            [else]
                                [set_variable]
                                    name = bosses_slain
                                    value = "$bosses_slain, $current_enemy_leader"
                                [/set_variable]
                            [/else]
                        [/if]
                        [gold]
                            side = 1
                            amount = 150
                        [/gold]
                        [lua]
                            code = <<
                                local fac = wesnoth.get_variable("chosen_faction") or "loyalist"
                                local bid = wesnoth.get_variable("boss1_id") or ""
                                -- {speaker, message}
                                local msgs = {
                                    loyalist = {
                                        greyhelm = {"narrator", "The fortress falls. Your men plant the banner and the column reforms. Another territory under your warband's command."},
                                        briarwen = {"narrator", "The forest thins. Whatever hold she had on this land is broken. Your lieutenants mark the territory on the map and your warband moves on."},
                                        maggash = {"narrator", "The plains fall quiet. The horde is broken and the survivors scatter. Your soldiers catch their breath and form up. This ground is yours now."},
                                        pale_conductor = {"narrator", "The fog lifts and the dead lie still. Your soldiers look shaken but they hold formation. The marshland is secured."},
                                        sithrak = {"hero", "The fires die down. Fill your waterskins and tend the burns. This mountain pass is ours — hard-won and well-earned."},
                                        ironband = {"hero", "Five mercenaries. Five graves. Strip the fortifications and mark this pass as conquered. We press on."},
                                    },
                                    elf = {
                                        greyhelm = {"narrator", "His walls crumble. In time the forest will reclaim this place. Your warband moves deeper into the contested lands."},
                                        briarwen = {"narrator", "Her magic fades and the twisted growth withers. The forest remembers its true shape. Your warband glides onward through the trees."},
                                        maggash = {"narrator", "The orcs scatter like startled crows. The land breathes easier and your warband moves with renewed purpose."},
                                        pale_conductor = {"hero", "The corruption withers. Cleanse the last of his influence. Let the land heal."},
                                        sithrak = {"narrator", "The drake's fire is quenched. Even the mountain yields to patience. Your warband descends the far slope in silence."},
                                        ironband = {"narrator", "Their company is no more. The pass opens, quiet and still. Your warband slips through like wind through branches."},
                                    },
                                    orc = {
                                        greyhelm = {"hero", "His fancy walls didn't save him. Good territory. Set up camp in the ruins and sharpen your blades."},
                                        briarwen = {"hero", "Elf is dead. Trees are just trees again. Good land for a camp — we're keeping it."},
                                        maggash = {"narrator", "His horde answers to you now. Or they're dead. Either way, the territory is yours. Your warband howls and moves on."},
                                        pale_conductor = {"hero", "Bones don't scare us. His land is our land now. Loot what you can and march on."},
                                        sithrak = {"hero", "Big lizard, big fire, big nothing. This mountain is ours."},
                                        ironband = {"hero", "Five tough ones. Five dead ones. Their gear is ours and so is their territory. Good fight."},
                                    },
                                    undead = {
                                        greyhelm = {"narrator", "His fortress falls silent. The living always do, eventually. This domain and its dead now serve a new will."},
                                        briarwen = {"narrator", "The druid's magic could not outlast the inevitable. Her forest grows still. Another territory claimed by silence."},
                                        maggash = {"narrator", "The horde provided many fresh corpses. This territory and its fallen now serve a darker purpose. Your host drifts onward."},
                                        pale_conductor = {"hero", "A rival necromancer, nothing more. His domain and his servants answer to me now."},
                                        sithrak = {"narrator", "Fire cannot burn what is already dead. The mountain is claimed. Your host descends in silence."},
                                        ironband = {"narrator", "Five champions, five new additions to your host. Their stronghold belongs to the dead now."},
                                    },
                                    drake = {
                                        greyhelm = {"narrator", "His walls meant nothing from above. Your flight circles the conquered fortress and roars. More territory for the nesting grounds."},
                                        briarwen = {"narrator", "The canopy burns well. Her domain is conquered and your flight claims the skies above it."},
                                        maggash = {"hero", "Ground-crawlers, all of them. This land is claimed for the flight. The thermals here are strong."},
                                        pale_conductor = {"narrator", "The dead do not fly. His marshland is conquered — another stretch of ground beneath your wings."},
                                        sithrak = {"hero", "A fellow drake, but a fool to stand alone. His mountain is mine now. The flight grows stronger."},
                                        ironband = {"narrator", "Dwarves dig deep but cannot reach the sky. Their pass is conquered. Your flight soars through."},
                                    },
                                    knalgan = {
                                        greyhelm = {"hero", "His treasury was light, but the territory? That'll pay for itself. Mark another conquest on the ledger."},
                                        briarwen = {"narrator", "Elven land. Good lumber, decent loot. Your dwarves are already appraising the timber. Another territory for the company."},
                                        maggash = {"hero", "Orcs don't carry much coin, but the land is worth something. Stake the claim and move on."},
                                        pale_conductor = {"narrator", "Creepy place, but it's yours now. Your rogues loot the ruins while your dwarves secure the perimeter. Business as usual."},
                                        sithrak = {"hero", "Drake scales fetch a good price. So does a conquered mountain pass. We're eating well tonight."},
                                        ironband = {"hero", "Rival mercs, out of business. Their contracts and their territory — all ours now. Good day's work."},
                                    },
                                }
                                local pool = msgs[fac] or msgs.loyalist
                                local entry = pool[bid] or {"narrator", "The territory is conquered."}
                                wesnoth.wml_actions.message{
                                    speaker=entry[1],
                                    image=entry[1] == "narrator" and "wesnoth-icon.png" or nil,
                                    message=entry[2] .. "\n\n<i>(+3 Renown, +150 Gold)</i>",
                                }
                            >>
                        [/lua]
                    [/then]
                    [else]
                        {VARIABLE last_scenario_type "battle"}
                    [/else]
                [/if]

                # Increment battle number AFTER boss check
                {VARIABLE_OP battle_number add 1}

                # Track defeated leader (won't appear again this run)
                [if]
                    [variable]
                        name = defeated_leaders
                        equals = ""
                    [/variable]
                    [then]
                        {VARIABLE defeated_leaders $current_enemy_leader}
                    [/then]
                    [else]
                        [set_variable]
                            name = defeated_leaders
                            value = "$defeated_leaders,$current_enemy_leader"
                        [/set_variable]
                    [/else]
                [/if]

                # Update act number
                [if]
                    [variable]
                        name = battle_number
                        greater_than = 10
                    [/variable]
                    [then]
                        {VARIABLE act_number 3}
                    [/then]
                    [elseif]
                        [variable]
                            name = battle_number
                            greater_than = 5
                        [/variable]
                        [then]
                            {VARIABLE act_number 2}
                        [/then]
                    [/elseif]
                [/if]
            [/then]
        [/if]
        {CLEAR_VARIABLE hero_died}

        # Meta-progression: unlock faction on final boss victory + pool unlocks
        [lua]
            code = <<
                local bn = wesnoth.get_variable("battle_number") or 1
                local fac = wesnoth.get_variable("chosen_faction") or ""
                local factions_unlocked = wesnoth.get_variable("factions_unlocked") or ""

                -- Final boss victory: unlock paired faction
                if bn > 15 then
                    local pairs = {loyalist="undead", elf="drake", orc="knalgan"}
                    local new_fac = pairs[fac]
                    if new_fac and not factions_unlocked:find(new_fac) then
                        factions_unlocked = factions_unlocked .. "," .. new_fac
                        wesnoth.set_variable("factions_unlocked", factions_unlocked)
                        wesnoth.wml_actions.message{
                            speaker = "narrator",
                            image = "wesnoth-icon.png",
                            message = "Your victory has drawn new allies. A new faction is now available!",
                        }
                    end
                end

                -- Past Boss 1: pool unlock happens on death (see death_screen.cfg)
                -- Final boss victory is handled above
            >>
        [/lua]

        # Gold carryover: 70%, early finish bonus = 2g/turn saved
        [lua]
            code = <<
                local turns_left = wesnoth.game_config.last_turn - wesnoth.current.turn
                if turns_left > 0 then
                    wesnoth.wml_actions.gold{side=1, amount=turns_left * 2}
                end
            >>
        [/lua]

        # Route to boss reward screen after boss victories
        [if]
            [variable]
                name = battle_number
                equals = 6
            [/variable]
            [or]
                [variable]
                    name = battle_number
                    equals = 11
                [/variable]
            [/or]
            [then]
                [endlevel]
                    result = victory
                    next_scenario = roguelite_boss_reward
                    carryover_percentage = 100
                    bonus = no
                    carryover_report = no
                    carryover_add = yes
                [/endlevel]
            [/then]
            [else]
                # Route to tavern after battles 2,4,7,9,12,14 — otherwise path choice
                [if]
                    [variable]
                        name = battle_number
                        equals = 3
                    [/variable]
                    [or]
                        [variable]
                            name = battle_number
                            equals = 5
                        [/variable]
                    [/or]
                    [or]
                        [variable]
                            name = battle_number
                            equals = 8
                        [/variable]
                    [/or]
                    [or]
                        [variable]
                            name = battle_number
                            equals = 10
                        [/variable]
                    [/or]
                    [or]
                        [variable]
                            name = battle_number
                            equals = 13
                        [/variable]
                    [/or]
                    [or]
                        [variable]
                            name = battle_number
                            equals = 15
                        [/variable]
                    [/or]
                    [then]
                        [endlevel]
                            result = victory
                            next_scenario = roguelite_tavern
                            carryover_percentage = 70
                            bonus = no
                            carryover_report = yes
                            carryover_add = yes
                        [/endlevel]
                    [/then]
                    [else]
                        [endlevel]
                            result = victory
                            next_scenario = roguelite_path_choice
                            carryover_percentage = 70
                            bonus = no
                            carryover_report = yes
                            carryover_add = yes
                        [/endlevel]
                    [/else]
                [/if]
            [/else]
        [/if]
    [/event]

    [event]
        name = die
        first_time_only = no
        [filter]
            side = 2
        [/filter]
        {VARIABLE_OP kills_this_run add 1}
        {VARIABLE_OP total_kills add 1}
    [/event]

    # Time runs out — treat as death
    [event]
        name = time over
        [kill]
            id = hero
            fire_event = yes
        [/kill]
    [/event]

    {ROGUELITE_DEATH_EVENT}

    # Loot pickup — moveto event
    [event]
        name = moveto
        first_time_only = no
        [filter]
            side = 1
        [/filter]
        [lua]
            code = <<
                local LOOT = wesnoth.dofile("~add-ons/Wesnoth_Roguelite/lua/loot.lua")
                local count = wesnoth.get_variable("loot_item_count") or 0
                if count == 0 then return end

                local ux = wesnoth.get_variable("x1")
                local uy = wesnoth.get_variable("y1")
                local unit = wesnoth.units.get(ux, uy)
                if not unit then return end

                for i = 0, count - 1 do
                    local vi = "loot_items[" .. i .. "]"
                    local lx = wesnoth.get_variable(vi .. ".x")
                    local ly = wesnoth.get_variable(vi .. ".y")
                    if lx == ux and ly == uy then
                        local item_id = wesnoth.get_variable(vi .. ".id")
                        local item_name = wesnoth.get_variable(vi .. ".name")
                        local find_flavor = wesnoth.get_variable(vi .. ".find_flavor")
                        local equip_flavor = wesnoth.get_variable(vi .. ".equip_flavor")
                        local desc = wesnoth.get_variable(vi .. ".desc")
                        local dialog_img = wesnoth.get_variable(vi .. ".dialog_image")
                        local map_img = wesnoth.get_variable(vi .. ".map_image")

                        -- Dialog 1: Discovery — pick up or leave?
                        local pick_msg = find_flavor .. "\n\n<span color='#BCB088'><b>" .. item_name .. "</b>: " .. desc .. "</span>"
                        wesnoth.wml_actions.message{
                            speaker = "narrator",
                            image = dialog_img,
                            message = pick_msg,
                            variable = "loot_pickup_choice",
                            wml.tag.option{label = "Pick up " .. item_name},
                            wml.tag.option{label = "Leave it"},
                        }

                        local choice = tonumber(wesnoth.get_variable("loot_pickup_choice")) or 0
                        if choice == 1 then
                            -- Find and apply the item
                            local bn = wesnoth.get_variable("battle_number") or 1
                            local tier = LOOT.get_tier(bn)
                            if tier then
                                for _, item in ipairs(LOOT.items[tier]) do
                                    if item.id == item_id then
                                        item.apply(unit)
                                        break
                                    end
                                end
                            end

                            -- Remove item from map
                            wesnoth.wml_actions.remove_item{x=lx, y=ly, image=map_img}

                            -- Dialog 2: Equip confirmation
                            local conf_msg = equip_flavor
                                .. "\n\n<span color='#BCB088'><b>" .. tostring(unit.name) .. "</b> equipped <b>" .. item_name .. "</b>.</span>"
                            wesnoth.wml_actions.message{
                                speaker = "narrator",
                                image = dialog_img,
                                message = conf_msg,
                            }

                            -- Clear this loot slot
                            wesnoth.set_variable(vi .. ".x", -1)
                            wesnoth.set_variable(vi .. ".y", -1)
                        end
                        wesnoth.set_variable("loot_pickup_choice")
                        break
                    end
                end
            >>
        [/lua]
    [/event]
#enddef
