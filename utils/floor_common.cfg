#textdomain wesnoth-Wesnoth_Roguelite

# Shared floor logic — included by every biome scenario.
# Sets up player side, randomizes enemy, handles events.

#define ROGUELITE_FLOOR_SIDES
    [side]
        side = 1
        controller = human
        team_name = player
        user_team_name = _"Roguelite"
        fog = yes
        gold = 100
        [leader]
            id = hero
            type = Spearman
            canrecruit = yes
            unrenamable = yes
        [/leader]
    [/side]

    [side]
        side = 2
        controller = ai
        team_name = enemy
        user_team_name = _"Enemy"
        gold = 100
        [leader]
            id = floor_boss
            type = Orcish Warrior
            canrecruit = yes
        [/leader]
    [/side]
#enddef

#define ROGUELITE_FLOOR_EVENTS
    [event]
        name = prestart

        # Transform leader
        [modify_unit]
            [filter]
                id = hero
            [/filter]
            type = $hero_type
            name = $hero_name
        [/modify_unit]

        # Player recruit list
        [if]
            [variable]
                name = chosen_faction
                equals = loyalist
            [/variable]
            [then]
                [set_recruit]
                    side = 1
                    recruit = Spearman, Bowman, Cavalryman, Mage
                [/set_recruit]
            [/then]
        [/if]
        [if]
            [variable]
                name = chosen_faction
                equals = elf
            [/variable]
            [then]
                [set_recruit]
                    side = 1
                    recruit = Elvish Fighter, Elvish Archer, Elvish Scout, Elvish Shaman
                [/set_recruit]
            [/then]
        [/if]
        [if]
            [variable]
                name = chosen_faction
                equals = orc
            [/variable]
            [then]
                [set_recruit]
                    side = 1
                    recruit = Orcish Grunt, Orcish Archer, Orcish Assassin, Wolf Rider
                [/set_recruit]
            [/then]
        [/if]
        [if]
            [variable]
                name = chosen_faction
                equals = undead
            [/variable]
            [then]
                [set_recruit]
                    side = 1
                    recruit = Skeleton, Dark Adept, Ghoul, Skeleton Archer
                [/set_recruit]
            [/then]
        [/if]
        [if]
            [variable]
                name = chosen_faction
                equals = drake
            [/variable]
            [then]
                [set_recruit]
                    side = 1
                    recruit = Drake Fighter, Drake Clasher, Drake Burner, Saurian Skirmisher
                [/set_recruit]
            [/then]
        [/if]
        [if]
            [variable]
                name = chosen_faction
                equals = knalgan
            [/variable]
            [then]
                [set_recruit]
                    side = 1
                    recruit = Dwarvish Fighter, Dwarvish Thunderer, Dwarvish Guardsman, Footpad
                [/set_recruit]
            [/then]
        [/if]

        # Randomize enemy
        [set_variable]
            name = enemy_roll
            rand = 1..6
        [/set_variable]
        [if]
            [variable]
                name = enemy_roll
                equals = 1
            [/variable]
            [then]
                [modify_unit]
                    [filter]
                        id = floor_boss
                    [/filter]
                    type = Lieutenant
                    name = _"Rogue Captain"
                [/modify_unit]
                [set_recruit]
                    side = 2
                    recruit = Spearman, Bowman, Heavy Infantryman, Cavalryman, Fencer, Mage, Horseman
                [/set_recruit]
                [modify_side]
                    side = 2
                    user_team_name = _"Deserters"
                [/modify_side]
            [/then]
        [/if]
        [if]
            [variable]
                name = enemy_roll
                equals = 2
            [/variable]
            [then]
                [modify_unit]
                    [filter]
                        id = floor_boss
                    [/filter]
                    type = Dark Sorcerer
                    name = _"Necromancer"
                [/modify_unit]
                [set_recruit]
                    side = 2
                    recruit = Skeleton, Skeleton Archer, Walking Corpse, Ghoul, Dark Adept
                [/set_recruit]
                [modify_side]
                    side = 2
                    user_team_name = _"Undead"
                [/modify_side]
            [/then]
        [/if]
        [if]
            [variable]
                name = enemy_roll
                equals = 3
            [/variable]
            [then]
                [modify_unit]
                    [filter]
                        id = floor_boss
                    [/filter]
                    type = Orcish Warrior
                    name = _"Warchief Grak"
                [/modify_unit]
                [set_recruit]
                    side = 2
                    recruit = Orcish Grunt, Orcish Archer, Wolf Rider, Orcish Assassin, Goblin Spearman
                [/set_recruit]
                [modify_side]
                    side = 2
                    user_team_name = _"Northerners"
                [/modify_side]
            [/then]
        [/if]
        [if]
            [variable]
                name = enemy_roll
                equals = 4
            [/variable]
            [then]
                [modify_unit]
                    [filter]
                        id = floor_boss
                    [/filter]
                    type = Elvish Captain
                    name = _"Warden Lithiel"
                [/modify_unit]
                [set_recruit]
                    side = 2
                    recruit = Elvish Fighter, Elvish Archer, Elvish Scout, Elvish Shaman
                [/set_recruit]
                [modify_side]
                    side = 2
                    user_team_name = _"Wood Elves"
                [/modify_side]
            [/then]
        [/if]
        [if]
            [variable]
                name = enemy_roll
                equals = 5
            [/variable]
            [then]
                [modify_unit]
                    [filter]
                        id = floor_boss
                    [/filter]
                    type = Drake Flare
                    name = _"Flamecaller Vrix"
                [/modify_unit]
                [set_recruit]
                    side = 2
                    recruit = Drake Fighter, Drake Clasher, Drake Burner, Saurian Skirmisher
                [/set_recruit]
                [modify_side]
                    side = 2
                    user_team_name = _"Drakes"
                [/modify_side]
            [/then]
        [/if]
        [if]
            [variable]
                name = enemy_roll
                equals = 6
            [/variable]
            [then]
                [modify_unit]
                    [filter]
                        id = floor_boss
                    [/filter]
                    type = Outlaw
                    name = _"Bandit King"
                [/modify_unit]
                [set_recruit]
                    side = 2
                    recruit = Footpad, Thug, Poacher, Thief
                [/set_recruit]
                [modify_side]
                    side = 2
                    user_team_name = _"Outlaws"
                [/modify_side]
            [/then]
        [/if]
        {CLEAR_VARIABLE enemy_roll}

        # Meta bonuses
        [if]
            [variable]
                name = meta_bonus_gold
                greater_than = 0
            [/variable]
            [then]
                [gold]
                    side = 1
                    amount = $meta_bonus_gold
                [/gold]
            [/then]
        [/if]

        # Scale enemy gold
        {VARIABLE enemy_bonus $floors_cleared}
        {VARIABLE_OP enemy_bonus multiply 20}
        [gold]
            side = 2
            amount = $enemy_bonus
        [/gold]
        {CLEAR_VARIABLE enemy_bonus}
    [/event]

    [event]
        name = start
        {VARIABLE current_floor $floors_cleared}
        {VARIABLE_OP current_floor add 1}
        [message]
            speaker = hero
            message = _"Floor $current_floor. Let's move."
        [/message]
        [objectives]
            [objective]
                description = _"Defeat the enemy leader"
                condition = win
            [/objective]
            [objective]
                description = _"Death of $hero_name"
                condition = lose
            [/objective]
            {TURNS_RUN_OUT}
        [/objectives]
    [/event]

    [event]
        name = victory
        {VARIABLE_OP floors_cleared add 1}
    [/event]

    [event]
        name = die
        first_time_only = no
        [filter]
            side = 2
        [/filter]
        {VARIABLE_OP kills_this_run add 1}
        {VARIABLE_OP total_kills add 1}
    [/event]

    {ROGUELITE_DEATH_EVENT}
#enddef
