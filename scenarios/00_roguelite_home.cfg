#textdomain wesnoth-Wesnoth_Roguelite

[scenario]
    id = roguelite_home
    name = _"Wesnoth Roguelike"
    next_scenario = roguelite_run_setup

    map_file = run_setup.map
    turns = 1
    victory_when_enemies_defeated = no

    [story]
        [part]
            background = "story/home-screen.webp"
            show_title = yes
            title = _"Wesnoth Roguelike"
            title_alignment = center
            story = _"A land torn by war. A commander rises.

Each run is a new campaign — recruit, fight, and survive as long as you can.
Death is permanent, but glory endures."
            text_layout = bottom
            text_alignment = center
        [/part]
        [if]
            [variable]
                name = total_deaths
                greater_than = 0
            [/variable]
            [then]
                [part]
                    background = "story/home-screen.webp"
                    title = _"Your Legacy"
                    title_alignment = center
                    story = _"$total_deaths commanders have fallen.
Best run: $best_run_floors battles won, $best_run_kills kills.
Last fallen: $last_hero_name ($last_hero_faction)

Press Next to begin a new run."
                    text_layout = middle
                    text_alignment = center
                [/part]
            [/then]
        [/if]
    [/story]

    [side]
        side = 1
        controller = human
        hidden = yes
        [leader]
            id = hero
            type = Lieutenant
            canrecruit = yes
        [/leader]
    [/side]

    [event]
        name = prestart
        # Init meta stats on first ever launch
        [if]
            [variable]
                name = total_deaths
                equals = ""
            [/variable]
            [then]
                {VARIABLE total_deaths 0}
                {VARIABLE best_run_floors 0}
                {VARIABLE best_run_kills 0}
                {VARIABLE last_hero_name ""}
                {VARIABLE last_hero_faction ""}
            [/then]
        [/if]

        # Go straight to run setup — map never shows
        [endlevel]
            result = victory
            next_scenario = roguelite_run_setup
            bonus = no
            carryover_percentage = 0
            carryover_report = no
            linger_mode = no
        [/endlevel]
    [/event]
[/scenario]
