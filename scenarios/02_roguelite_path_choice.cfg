#textdomain wesnoth-Wesnoth_Roguelite

[scenario]
    id = roguelite_path_choice
    name = _"Choose Your Path"
    next_scenario = roguelite_floor_forest

    map_file = run_setup.map
    turns = 1
    victory_when_enemies_defeated = no

    [side]
        side = 1
        controller = human
        hidden = yes
        [leader]
            id = hero
            type = Spearman
            canrecruit = yes
        [/leader]
    [/side]

    [event]
        name = prestart

        {VARIABLE current_floor $floors_cleared}
        {VARIABLE_OP current_floor add 1}

        # Weighted biome pools
        [set_variable]
            name = biome_a
            rand = forest,elven_forest,plains,farmland,valley,forest,plains,valley,mountain,swamp,winter,cave
        [/set_variable]
        [set_variable]
            name = biome_b
            rand = forest,elven_forest,plains,farmland,valley,mountain,swamp,winter,elven_forest,farmland,desert,coastal
        [/set_variable]
        [set_variable]
            name = biome_c
            rand = forest,plains,valley,mountain,swamp,winter,elven_forest,farmland,cave,lava,mushroom,coastal
        [/set_variable]

        # Generate descriptions per biome
        # Option A
        {VARIABLE desc_a _"A path lies ahead."}
        {VARIABLE img_a "items/flower4.png"}
        [if]
            [or]
                [variable]
                    name = biome_a
                    equals = forest
                [/variable]
                [variable]
                    name = biome_a
                    equals = elven_forest
                [/variable]
            [/or]
            [then]
                [set_variable]
                    name = label_a
                    rand = A trail through ancient trees,A path into the deep woods,Birdsong echoes from the treeline
                [/set_variable]
                [set_variable]
                    name = desc_a
                    rand = The canopy blocks the sun.,You smell pine and damp earth.,Branches creak in the wind.
                [/set_variable]
                {VARIABLE img_a "items/flower4.png"}
            [/then]
        [/if]
        [if]
            [or]
                [variable]
                    name = biome_a
                    equals = plains
                [/variable]
                [variable]
                    name = biome_a
                    equals = farmland
                [/variable]
            [/or]
            [then]
                [set_variable]
                    name = label_a
                    rand = An open road across the fields,A dusty trail through farmland,Smoke rises from a distant village
                [/set_variable]
                [set_variable]
                    name = desc_a
                    rand = Wide open ground — nowhere to hide.,The road is well-traveled.,Crops sway in the breeze.
                [/set_variable]
                {VARIABLE img_a "items/grain.png"}
            [/then]
        [/if]
        [if]
            [or]
                [variable]
                    name = biome_a
                    equals = mountain
                [/variable]
                [variable]
                    name = biome_a
                    equals = valley
                [/variable]
            [/or]
            [then]
                [set_variable]
                    name = label_a
                    rand = A narrow mountain pass,A winding path into the highlands,A valley between jagged peaks
                [/set_variable]
                [set_variable]
                    name = desc_a
                    rand = The air grows thin.,Rocks tumble in the distance.,Eagles circle overhead.
                [/set_variable]
                {VARIABLE img_a "items/gold-coins-large.png"}
            [/then]
        [/if]
        [if]
            [or]
                [variable]
                    name = biome_a
                    equals = swamp
                [/variable]
                [variable]
                    name = biome_a
                    equals = coastal
                [/variable]
            [/or]
            [then]
                [set_variable]
                    name = label_a
                    rand = A soggy path along the water,A misty trail through the marshes,The sound of waves in the fog
                [/set_variable]
                [set_variable]
                    name = desc_a
                    rand = The ground squelches underfoot.,Mist clings to everything.,Something moves beneath the surface.
                [/set_variable]
                {VARIABLE img_a "items/ankh-necklace.png"}
            [/then]
        [/if]
        [if]
            [or]
                [variable]
                    name = biome_a
                    equals = cave
                [/variable]
                [variable]
                    name = biome_a
                    equals = lava
                [/variable]
                [variable]
                    name = biome_a
                    equals = mushroom
                [/variable]
            [/or]
            [then]
                [set_variable]
                    name = label_a
                    rand = A gaping hole in the earth,A cave mouth yawns before you,Stairs descend into darkness
                [/set_variable]
                [set_variable]
                    name = desc_a
                    rand = A foul wind rises from below.,You hear echoes from the deep.,The air is warm and sulfurous.
                [/set_variable]
                {VARIABLE img_a "items/ankh-necklace.png"}
            [/then]
        [/if]
        [if]
            [variable]
                name = biome_a
                equals = winter
            [/variable]
            [then]
                [set_variable]
                    name = label_a
                    rand = A frozen trail through the snow,A blizzard-swept path northward,Ice crunches beneath your boots
                [/set_variable]
                [set_variable]
                    name = desc_a
                    rand = The cold bites at your skin.,Snow blankets everything in silence.,Frost clings to the trees.
                [/set_variable]
                {VARIABLE img_a "items/holy-water.png"}
            [/then]
        [/if]
        [if]
            [variable]
                name = biome_a
                equals = desert
            [/variable]
            [then]
                [set_variable]
                    name = label_a
                    rand = A scorched trail into the wastes,Heat shimmers on the horizon,Sand stretches endlessly ahead
                [/set_variable]
                [set_variable]
                    name = desc_a
                    rand = The sun is merciless.,Water will be scarce.,Vultures circle above.
                [/set_variable]
                {VARIABLE img_a "items/gold-coins-large.png"}
            [/then]
        [/if]

        # For options B and C, reuse the same logic pattern
        # but with biome_b and biome_c. To keep this manageable,
        # we'll use a simpler fallback for B and C.
        {VARIABLE label_b _"Another way forward"}
        {VARIABLE desc_b _"Who knows what lies ahead?"}
        {VARIABLE img_b "items/gold-coins-large.png"}
        {VARIABLE label_c _"A third option"}
        {VARIABLE desc_c _"Fortune favors the bold."}
        {VARIABLE img_c "items/ankh-necklace.png"}

        # Quick biome hints for B
        [if]
            [or]
                [variable]
                    name = biome_b
                    equals = forest
                [/variable]
                [variable]
                    name = biome_b
                    equals = elven_forest
                [/variable]
            [/or]
            [then]
                [set_variable]
                    name = label_b
                    rand = Through the whispering woods,A mossy path between the oaks,Into the green darkness
                [/set_variable]
                [set_variable]
                    name = desc_b
                    rand = Leaves rustle with secrets.,The forest watches you.,Dappled light filters through.
                [/set_variable]
                {VARIABLE img_b "items/flower4.png"}
            [/then]
        [/if]
        [if]
            [or]
                [variable]
                    name = biome_b
                    equals = mountain
                [/variable]
                [variable]
                    name = biome_b
                    equals = valley
                [/variable]
                [variable]
                    name = biome_b
                    equals = winter
                [/variable]
            [/or]
            [then]
                [set_variable]
                    name = label_b
                    rand = Up the rocky slope,Through the mountain fog,Along a crumbling ridge
                [/set_variable]
                [set_variable]
                    name = desc_b
                    rand = The climb will be hard.,Wind howls through the pass.,Snow dusts the peaks above.
                [/set_variable]
                {VARIABLE img_b "items/holy-water.png"}
            [/then]
        [/if]
        [if]
            [or]
                [variable]
                    name = biome_b
                    equals = plains
                [/variable]
                [variable]
                    name = biome_b
                    equals = farmland
                [/variable]
                [variable]
                    name = biome_b
                    equals = desert
                [/variable]
            [/or]
            [then]
                [set_variable]
                    name = label_b
                    rand = Across the open ground,Down the trade road,Through the dry expanse
                [/set_variable]
                [set_variable]
                    name = desc_b
                    rand = No cover for miles.,Dust devils dance ahead.,The road stretches on.
                [/set_variable]
                {VARIABLE img_b "items/gold-coins-large.png"}
            [/then]
        [/if]
        [if]
            [or]
                [variable]
                    name = biome_b
                    equals = swamp
                [/variable]
                [variable]
                    name = biome_b
                    equals = coastal
                [/variable]
                [variable]
                    name = biome_b
                    equals = cave
                [/variable]
                [variable]
                    name = biome_b
                    equals = lava
                [/variable]
                [variable]
                    name = biome_b
                    equals = mushroom
                [/variable]
            [/or]
            [then]
                [set_variable]
                    name = label_b
                    rand = Into the murky unknown,Down a dark passage,Through the mist
                [/set_variable]
                [set_variable]
                    name = desc_b
                    rand = Danger lurks here.,The air feels wrong.,Your instincts say turn back.
                [/set_variable]
                {VARIABLE img_b "items/ankh-necklace.png"}
            [/then]
        [/if]

        # Quick biome hints for C
        {VARIABLE label_c _"A third way"}
        {VARIABLE desc_c _"The unknown beckons."}
        {VARIABLE img_c "items/ankh-necklace.png"}
        [if]
            [or]
                [variable]
                    name = biome_c
                    equals = forest
                [/variable]
                [variable]
                    name = biome_c
                    equals = elven_forest
                [/variable]
                [variable]
                    name = biome_c
                    equals = valley
                [/variable]
            [/or]
            [then]
                [set_variable]
                    name = label_c
                    rand = Along a hidden deer trail,Through a sun-dappled glade,Into the quiet valley
                [/set_variable]
                [set_variable]
                    name = desc_c
                    rand = Peaceful — perhaps too peaceful.,Wildflowers line the path.,A stream babbles nearby.
                [/set_variable]
                {VARIABLE img_c "items/flower4.png"}
            [/then]
        [/if]
        [if]
            [or]
                [variable]
                    name = biome_c
                    equals = mountain
                [/variable]
                [variable]
                    name = biome_c
                    equals = winter
                [/variable]
                [variable]
                    name = biome_c
                    equals = desert
                [/variable]
            [/or]
            [then]
                [set_variable]
                    name = label_c
                    rand = Over the harsh terrain,Through the bitter cold,Across the barren waste
                [/set_variable]
                [set_variable]
                    name = desc_c
                    rand = This will test your endurance.,Not for the faint of heart.,Survival is the first challenge.
                [/set_variable]
                {VARIABLE img_c "items/holy-water.png"}
            [/then]
        [/if]
        [if]
            [or]
                [variable]
                    name = biome_c
                    equals = plains
                [/variable]
                [variable]
                    name = biome_c
                    equals = farmland
                [/variable]
            [/or]
            [then]
                [set_variable]
                    name = label_c
                    rand = Down the king's road,Through the countryside,Past the old mill
                [/set_variable]
                [set_variable]
                    name = desc_c
                    rand = Civilization is near.,Smoke rises from chimneys.,The road is well-maintained.
                [/set_variable]
                {VARIABLE img_c "items/grain.png"}
            [/then]
        [/if]
        [if]
            [or]
                [variable]
                    name = biome_c
                    equals = swamp
                [/variable]
                [variable]
                    name = biome_c
                    equals = coastal
                [/variable]
                [variable]
                    name = biome_c
                    equals = cave
                [/variable]
                [variable]
                    name = biome_c
                    equals = lava
                [/variable]
                [variable]
                    name = biome_c
                    equals = mushroom
                [/variable]
            [/or]
            [then]
                [set_variable]
                    name = label_c
                    rand = Into the depths,Through the fetid bog,Down the crumbling stairs
                [/set_variable]
                [set_variable]
                    name = desc_c
                    rand = You may regret this.,The darkness swallows sound.,Something watches from below.
                [/set_variable]
                {VARIABLE img_c "items/ankh-necklace.png"}
            [/then]
        [/if]

        # Present the choice
        [message]
            speaker = narrator
            image = "wesnoth-icon.png"
            message = _"<b>Floor $current_floor</b> — Which way?"
            variable = path_pick
            [option]
                image = $img_a
                label = $label_a
                description = $desc_a
                value = a
            [/option]
            [option]
                image = $img_b
                label = $label_b
                description = $desc_b
                value = b
            [/option]
            [option]
                image = $img_c
                label = $label_c
                description = $desc_c
                value = c
            [/option]
        [/message]

        # Resolve biome
        [if]
            [variable]
                name = path_pick
                equals = a
            [/variable]
            [then]
                {VARIABLE current_biome $biome_a}
            [/then]
        [/if]
        [if]
            [variable]
                name = path_pick
                equals = b
            [/variable]
            [then]
                {VARIABLE current_biome $biome_b}
            [/then]
        [/if]
        [if]
            [variable]
                name = path_pick
                equals = c
            [/variable]
            [then]
                {VARIABLE current_biome $biome_c}
            [/then]
        [/if]

        # Cleanup
        {CLEAR_VARIABLE biome_a}
        {CLEAR_VARIABLE biome_b}
        {CLEAR_VARIABLE biome_c}
        {CLEAR_VARIABLE label_a}
        {CLEAR_VARIABLE label_b}
        {CLEAR_VARIABLE label_c}
        {CLEAR_VARIABLE desc_a}
        {CLEAR_VARIABLE desc_b}
        {CLEAR_VARIABLE desc_c}
        {CLEAR_VARIABLE img_a}
        {CLEAR_VARIABLE img_b}
        {CLEAR_VARIABLE img_c}

        [endlevel]
            result = victory
            next_scenario = roguelite_floor_$current_biome
            bonus = no
            carryover_percentage = 0
            carryover_report = no
            linger_mode = no
        [/endlevel]
    [/event]
[/scenario]
