#textdomain wesnoth-Wesnoth_Roguelite
[scenario]
    id = roguelite_battle_farmland
    name = _"Conquest — Battle $battle_number"
    next_scenario = roguelite_path_choice
    map_generation = lua
    [generator]
        id = mapgen_farmland
        config_name = _"Farmland"
        create_map = << return wesnoth.dofile("~add-ons/Wesnoth_Roguelite/lua/mapgen_farmland.lua") >>
    [/generator]
    {DEFAULT_SCHEDULE}
    victory_when_enemies_defeated = yes
    {SCENARIO_MUSIC "travelling_minstrels.ogg"}
    {ROGUELITE_FLOOR_SIDES}
    {ROGUELITE_FLOOR_EVENTS}
[/scenario]
