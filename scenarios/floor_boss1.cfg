#textdomain wesnoth-Wesnoth_Roguelite

# Boss 1 scenario — Battle 5
[scenario]
    id = roguelite_boss1
    name = _"Boss Battle"
    next_scenario = roguelite_path_choice

    map_file = boss1_greyhelm.map
    turns = 30
    victory_when_enemies_defeated = yes

    {ROGUELITE_FLOOR_EVENTS}
    {ROGUELITE_DEATH_EVENT}

    [side]
        side = 1
        controller = human
        team_name = player
        user_team_name = _"Roguelite"
        fog = no
        gold = 100
        village_gold = 2
        [leader]
            id = hero
            type = Spearman
            canrecruit = yes
        [/leader]
    [/side]

    [side]
        side = 2
        controller = ai
        team_name = enemy
        user_team_name = _"Enemy"
        no_leader = yes
        gold = 0
        [ai]
            aggression = 1.0
            caution = 0.0
            village_value = 10
        [/ai]
    [/side]

    [side]
        side = 3
        controller = ai
        team_name = hostile
        user_team_name = _"Hostile"
        no_leader = yes
        gold = 0
        hidden = yes
    [/side]

    [event]
        name = prestart

        [lua]
            code = <<
                -- Ensure hero has correct type/name
                local hero = wesnoth.units.find_on_map{id="hero"}[1]
                if hero then
                    local ht = wesnoth.get_variable("hero_type") or ""
                    if ht ~= "" and hero.type ~= ht then
                        wesnoth.wml_actions.modify_unit{
                            wml.tag.filter{id="hero"},
                            type = ht,
                            name = wesnoth.get_variable("hero_name") or hero.name,
                        }
                    end
                end

                local B1 = wesnoth.dofile("~add-ons/Wesnoth_Roguelite/lua/boss1.lua")
                local boss

                -- Debug override
                local debug_id = wesnoth.get_variable("debug_boss_id") or ""
                if debug_id ~= "" then
                    for _, b in ipairs(B1.bosses) do
                        if b.id == debug_id then boss = b; break end
                    end
                    wesnoth.set_variable("debug_boss_id", "")
                end
                if not boss then boss = B1.pick_boss() end

                -- Store boss info
                wesnoth.set_variable("current_enemy_leader", boss.name)
                wesnoth.set_variable("current_enemy_faction", boss.faction)
                wesnoth.set_variable("boss1_id", boss.id)
                wesnoth.set_variable("current_territory_name", boss.name .. "'s Domain")

                -- Fog for Pale Conductor
                if boss.id == "pale_conductor" then
                    wesnoth.wml_actions.modify_side{side=1, fog=true}
                end

                -- Replace map to match boss (skip if already correct)
                if boss.map ~= "boss1_greyhelm.map" then
                    local map_str = wesnoth.read_file(boss.map)
                    if map_str then
                        wesnoth.wml_actions.replace_map{map_data=map_str, expand=true, shrink=true}
                    end
                end

                -- Economy scaling
                local bn = wesnoth.get_variable("battle_number") or 5
                local side1 = wesnoth.sides[1]
                side1.base_income = math.floor(1.5 * (bn - 1))
                side1.village_support = 1 + (bn - 1)

                -- Set side 1 recruit list
                local base_recruits = {
                    loyalist = "Spearman,Bowman,Cavalryman,Fencer,Merman Fighter",
                    elf = "Elvish Fighter,Elvish Archer,Elvish Shaman,Elvish Scout",
                    orc = "Orcish Grunt,Orcish Archer,Troll Whelp,Naga Fighter,Goblin Spearman",
                    undead = "Skeleton,Skeleton Archer,Walking Corpse,Vampire Bat,Dark Adept,Ghoul",
                    drake = "Drake Fighter,Drake Glider,Saurian Skirmisher,Saurian Augur",
                    knalgan = "Dwarvish Fighter,Dwarvish Guardsman,Thief,Poacher,Footpad",
                }
                local faction = wesnoth.get_variable("chosen_faction") or "loyalist"
                wesnoth.wml_actions.set_recruit{side=1, recruit=base_recruits[faction] or base_recruits.loyalist}
                local unlocked = wesnoth.get_variable("unlocked_recruits") or ""
                if unlocked ~= "" then
                    for utype in unlocked:gmatch("[^,]+") do
                        wesnoth.wml_actions.allow_recruit{side=1, type=utype:match("^%s*(.-)%s*$")}
                    end
                end

                -- Recall cost scaling
                for _, unit in ipairs(wesnoth.units.find_on_recall{side=1}) do
                    if unit.level <= 1 then
                        unit.recall_cost = unit.__cfg.cost
                    else
                        unit.recall_cost = math.max(1, math.floor(unit.__cfg.cost * 0.6))
                    end
                end

                -- Set up side 2 leader
                local keep = wesnoth.special_locations["2"]
                if keep then
                    keep = {keep[1], keep[2]}
                else
                    -- No side 2 start — place on right side
                    local m = wesnoth.current.map
                    keep = {m.playable_width - 3, math.floor(m.playable_height / 2)}
                end
                local leader = wesnoth.units.create{
                    type = boss.type, side = 2, id = "boss1_leader",
                    name = boss.name, canrecruit = true,
                    generate_name = false, random_traits = false,
                }
                leader:to_map(keep[1], keep[2])
                -- Verify placement
                if not wesnoth.units.find_on_map{id="boss1_leader"}[1] then
                    -- Emergency fallback
                    leader:to_map(20, 10)
                end

                -- Set gold and recruits for side 2
                wesnoth.sides[2].gold = boss.gold
                if #boss.recruits > 0 then
                    wesnoth.wml_actions.set_recruit{side=2, recruit=table.concat(boss.recruits, ",")}
                end

                -- === BOSS-SPECIFIC SETUP ===

                -- Greyhelm: movement 0, pre-placed guardians on castle
                if boss.ai == "guardian" then
                    leader.moves = 0
                    leader.max_moves = 0
                end

                -- Greyhelm: lock movement to 0, steadfast
                if boss.ai == "guardian" then
                    wesnoth.wml_actions.object{
                        silent = true,
                        wml.tag.filter{id="boss1_leader"},
                        wml.tag.effect{apply_to="movement", set=0},
                    }
                    wesnoth.wml_actions.object{
                        silent = true,
                        wml.tag.filter{id="boss1_leader"},
                        wml.tag.effect{
                            apply_to = "new_ability",
                            wml.tag.abilities{
                                wml.tag.resistance{
                                    id = "steadfast",
                                    multiply = 2,
                                    max_value = 50,
                                    active_on = "defense",
                                    apply_to = "self",
                                    name = "steadfast",
                                    description = "This unit's resistances are doubled when defending, up to 50%.",
                                },
                            },
                        },
                    }
                end

                -- Berserk melee (Gutripper)
                if boss.attack_mods and boss.attack_mods.berserk then
                    wesnoth.wml_actions.object{
                        silent = true,
                        wml.tag.filter{id="boss1_leader"},
                        wml.tag.effect{
                            apply_to = "attack", range = "melee",
                            wml.tag.set_specials{mode="append", wml.tag.berserk{value=30}},
                        },
                    }
                end

                -- Regeneration (Thornweaver)
                if boss.abilities and boss.abilities[1] == "regenerate" then
                    wesnoth.wml_actions.object{
                        silent = true,
                        wml.tag.filter{id="boss1_leader"},
                        wml.tag.effect{
                            apply_to = "new_ability",
                            wml.tag.abilities{
                                wml.tag.regenerate{
                                    value = 8, id = "boss_regen",
                                    name = "regenerates",
                                    description = "Regenerates 8 HP per turn.",
                                },
                            },
                        },
                    }
                end

                -- Aggressive AI (Gutripper)
                if boss.ai == "aggressive" then
                    wesnoth.wml_actions.modify_side{side=2, wml.tag.ai{aggression=1.0, caution=0.0}}
                end

                -- Pre-placed guardian units (Greyhelm) — hardcoded relative to keep
                if boss.pre_placed and not boss.pre_placed_horde and boss.gold > 0 then
                    local kx, ky = keep[1], keep[2]
                    local positions = {
                        {kx,     ky + 1}, -- White Mage (directly below keep)
                        {kx - 1, ky + 2}, -- Pikeman left
                        {kx + 1, ky + 2}, -- Pikeman right
                    }
                    for i, pp in ipairs(boss.pre_placed) do
                        if positions[i] then
                            local px, py = positions[i][1], positions[i][2]
                            local u = wesnoth.units.create{type=pp.type, side=2, generate_name=true, random_traits=true}
                            u:to_map(px, py)
                            wesnoth.wml_actions.object{
                                silent = true,
                                wml.tag.filter{x=px, y=py},
                                wml.tag.effect{apply_to="movement", set=0},
                            }
                        end
                    end
                    wesnoth.wml_actions.modify_side{side=2, wml.tag.ai{
                        aggression=1.0, caution=0.0,
                        village_value=10,
                    }}
                end

                -- Ironband's champions: spread across map on hills/villages
                if boss.pre_placed and boss.gold == 0 and not boss.pre_placed_horde then
                    local map = wesnoth.current.map
                    local w, h = map.playable_width, map.playable_height
                    -- Place champions at strategic positions across the right 2/3
                    local positions = {
                        {math.floor(w*0.5), math.floor(h*0.3)},
                        {math.floor(w*0.7), math.floor(h*0.5)},
                        {math.floor(w*0.5), math.floor(h*0.7)},
                        {math.floor(w*0.8), math.floor(h*0.3)},
                        {math.floor(w*0.8), math.floor(h*0.7)},
                    }
                    for i, pp in ipairs(boss.pre_placed) do
                        local pos = positions[i]
                        if pos then
                            local u = wesnoth.units.create{
                                type=pp.type, side=2, random_traits=true,
                                name=pp.name or nil,
                                generate_name=(pp.name == nil),
                            }
                            u:to_map(pos[1], pos[2])
                        end
                    end
                end

                -- Gutripper's goblin horde
                if boss.pre_placed_horde then
                    local map = wesnoth.current.map
                    local w, h = map.playable_width, map.playable_height
                    local horde = {
                        "Goblin Spearman","Goblin Spearman","Goblin Spearman","Goblin Spearman",
                        "Goblin Spearman","Goblin Spearman","Goblin Spearman","Goblin Spearman",
                        "Goblin Spearman","Goblin Spearman","Goblin Spearman","Goblin Spearman",
                        "Goblin Impaler","Goblin Impaler","Goblin Rouser","Goblin Rouser",
                        "Wolf Rider","Wolf Rider",
                    }
                    leader:to_map(w - 3, math.floor(h / 2))
                    for _, utype in ipairs(horde) do
                        for _ = 1, 50 do
                            local hx = wesnoth.random(math.floor(w * 0.5), w - 1)
                            local hy = wesnoth.random(2, h - 1)
                            if not wesnoth.units.get(hx, hy) then
                                local u = wesnoth.units.create{type=utype, side=2, generate_name=true, random_traits=true}
                                u:to_map(hx, hy)
                                break
                            end
                        end
                    end
                end

            >>
        [/lua]
    [/event]

    # Pre-battle dialog (runs after map is visible)
    [event]
        name = start
        [lua]
            code = <<
                local DIALOG = wesnoth.dofile("~add-ons/Wesnoth_Roguelite/lua/boss1_dialog.lua")
                local boss_id = wesnoth.get_variable("boss1_id") or ""
                local faction = wesnoth.get_variable("chosen_faction") or "loyalist"
                local boss_dialog = DIALOG.dialog[boss_id]
                local fac_dialog = boss_dialog and boss_dialog[faction]
                if fac_dialog then
                    for _, line in ipairs(fac_dialog) do
                        if line[1] == "boss" then
                            wesnoth.wml_actions.message{speaker="boss1_leader", message=line[2]}
                        elseif line[1] == "hero" then
                            wesnoth.wml_actions.message{speaker="hero", message=line[2]}
                        elseif line[1] == "narrator" then
                            wesnoth.wml_actions.message{speaker="narrator", image="wesnoth-icon.png", message=line[2]}
                        end
                    end
                end
            >>
        [/lua]
    [/event]

    # === BOSS MECHANICS ===

    # Thornweaver: forest growth + wose spawn every 2 turns
    [event]
        name = turn refresh
        first_time_only = no
        [filter_condition]
            [variable]
                name = boss1_id
                equals = briarwen
            [/variable]
            [variable]
                name = side_number
                equals = 2
            [/variable]
        [/filter_condition]
        [lua]
            code = <<
                if wesnoth.current.turn % 2 ~= 0 then return end
                local map = wesnoth.current.map
                local w, h = map.playable_width, map.playable_height

                -- Forest growth: convert 2-3 grass hexes adjacent to forest
                local converted = 0
                for _ = 1, 60 do
                    if converted >= 3 then break end
                    local x = wesnoth.random(1, w)
                    local y = wesnoth.random(1, h)
                    local t = tostring(wesnoth.current.map[{x, y}] or "")
                    if t == "Gg" or t == "Gd" or t == "Gll" then
                        local adj_forest = false
                        for _, loc in ipairs(wesnoth.map.get_adjacent_hexes(x, y)) do
                            local at = tostring(wesnoth.current.map[loc] or "")
                            if at:find("Fp") then adj_forest = true; break end
                        end
                        if adj_forest then
                            wesnoth.current.map[{x, y}] = "Gs^Fp"
                            converted = converted + 1
                        end
                    end
                end

                -- Wose spawn near player units
                local pu = wesnoth.units.find_on_map{side=1}
                if #pu > 0 then
                    local target = pu[wesnoth.random(1, #pu)]
                    for _ = 1, 40 do
                        local sx = target.x + wesnoth.random(-6, 6)
                        local sy = target.y + wesnoth.random(-6, 6)
                        if sx >= 1 and sy >= 1 and sx <= w and sy <= h then
                            local st = tostring(wesnoth.current.map[{sx, sy}] or "")
                            if st:find("Fp") and not wesnoth.units.get(sx, sy) then
                                wesnoth.units.create{type="Wose", side=2, generate_name=true, random_traits=true}:to_map(sx, sy)
                                break
                            end
                        end
                    end
                end
            >>
        [/lua]
    [/event]

    # Pale Conductor: corpse spawns every 2 turns on side 2 villages
    [event]
        name = turn refresh
        first_time_only = no
        [filter_condition]
            [variable]
                name = boss1_id
                equals = pale_conductor
            [/variable]
            [variable]
                name = side_number
                equals = 2
            [/variable]
        [/filter_condition]
        [lua]
            code = <<
                if wesnoth.current.turn % 2 ~= 0 then return end
                -- Find villages owned by side 2
                local map = wesnoth.current.map
                for x = 1, map.playable_width do
                    for y = 1, map.playable_height do
                        local owner = wesnoth.map.get_owner(x, y)
                        if owner == 2 then
                            local t = tostring(wesnoth.current.map[{x, y}] or "")
                            if t:find("V") and not wesnoth.units.get(x, y) then
                                wesnoth.units.create{type="Walking Corpse", side=2, generate_name=true}:to_map(x, y)
                            end
                        end
                    end
                end
            >>
        [/lua]
    [/event]

    # Embercrest: fire aura — 4 damage to adjacent enemies
    [event]
        name = turn refresh
        first_time_only = no
        [filter_condition]
            [variable]
                name = boss1_id
                equals = sithrak
            [/variable]
            [variable]
                name = side_number
                equals = 2
            [/variable]
        [/filter_condition]
        [lua]
            code = <<
                local boss = wesnoth.units.find_on_map{id="boss1_leader"}[1]
                if not boss then return end
                for _, loc in ipairs(wesnoth.map.get_adjacent_hexes(boss.x, boss.y)) do
                    local u = wesnoth.units.get(loc[1], loc[2])
                    if u and u.side == 1 then
                        wesnoth.wml_actions.harm_unit{
                            wml.tag.filter{x=u.x, y=u.y},
                            amount = 4, fire_event = false,
                            animate = true, damage_type = "fire",
                        }
                    end
                end
            >>
        [/lua]
    [/event]

    # Gutripper: full aggression when broke
    [event]
        name = turn refresh
        first_time_only = no
        [filter_condition]
            [variable]
                name = boss1_id
                equals = maggash
            [/variable]
        [/filter_condition]
        [lua]
            code = <<
                if wesnoth.sides[2].gold <= 0 then
                    wesnoth.wml_actions.modify_side{side=2, wml.tag.ai{aggression=1.0, caution=0.0}}
                end
            >>
        [/lua]
    [/event]
[/scenario]
