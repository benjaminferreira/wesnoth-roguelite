#textdomain wesnoth-Wesnoth_Roguelite
[scenario]
    id = roguelite_floor_elven_forest
    name = _"Roguelite — Elven Forest"
    next_scenario = roguelite_path_choice
    map_generation = lua
    [generator]
        id = mapgen_elven_forest
        config_name = _"Elven Forest"
        create_map = << return wesnoth.dofile("~add-ons/Wesnoth_Roguelite/lua/mapgen_elven_forest.lua") >>
