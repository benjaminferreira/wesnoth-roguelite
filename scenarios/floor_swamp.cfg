#textdomain wesnoth-Wesnoth_Roguelite
[scenario]
    id = roguelite_battle_swamp
    name = _"Battle — Swamp"
    next_scenario = roguelite_path_choice
    map_generation = lua
    [generator]
        id = mapgen_swamp
        config_name = _"Swamp"
        create_map = << return wesnoth.dofile("~add-ons/Wesnoth_Roguelite/lua/mapgen_swamp.lua") >>
    [/generator]
    {DEFAULT_SCHEDULE}
    victory_when_enemies_defeated = yes
    {SCENARIO_MUSIC "vengeful.ogg"}
    {EXTRA_SCENARIO_MUSIC "siege_of_laurelmor.ogg"}
    {ROGUELITE_FLOOR_SIDES}
    {ROGUELITE_FLOOR_EVENTS}
[/scenario]
