#textdomain wesnoth-Wesnoth_Roguelite
[scenario]
    id = roguelite_floor_farmland
    name = _"Roguelite — Farmland"
    next_scenario = roguelite_path_choice
    map_generation = lua
    [generator]
        id = mapgen_farmland
        config_name = _"Farmland"
        create_map = << return wesnoth.dofile("~add-ons/Wesnoth_Roguelite/lua/mapgen_farmland.lua") >>
