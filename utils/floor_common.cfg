#textdomain wesnoth-Wesnoth_Roguelite

# Shared floor logic — included by every biome scenario.
# Sets up player side, randomizes enemy, handles events.

#define ROGUELITE_FLOOR_SIDES
    [side]
        side = 1
        controller = human
        team_name = player
        user_team_name = _"Roguelite"
        fog = no
        gold = 100
        village_gold = 2
        village_support = 1
        base_income = 0
        [leader]
            id = hero
            type = Spearman
            canrecruit = yes
            unrenamable = yes
            random_traits = yes
        [/leader]
    [/side]

    [side]
        side = 2
        controller = ai
        team_name = enemy
        user_team_name = _"Enemy"
        gold = 100
        [leader]
            id = floor_boss
            type = Orcish Warrior
            canrecruit = yes
            random_traits = yes
        [/leader]
    [/side]

    [side]
        side = 3
        controller = ai
        team_name = hostile
        user_team_name = _"Hostile"
        no_leader = yes
        gold = 0
        hidden = yes
    [/side]
#enddef

#define ROGUELITE_FLOOR_EVENTS
    [event]
        name = prestart

        # Transform leader (only on first battle — after that, carryover preserves type/XP)
        [if]
            [variable]
                name = battle_number
                equals = 1
            [/variable]
            [then]
                [modify_unit]
                    [filter]
                        id = hero
                    [/filter]
                    type = $hero_type
                    name = $hero_name
                [/modify_unit]
            [/then]
        [/if]

        # Economy scaling: income and village support grow per battle
        [lua]
            code = <<
                local bn = wesnoth.get_variable("battle_number") or 1
                -- Income scaling: +1.5 per battle
                local scaled_income = math.floor(1.5 * (bn - 1))
                -- Village support scaling: +1 per battle
                local scaled_support = 1 + (bn - 1)
                local side = wesnoth.sides[1]
                side.base_income = scaled_income
                side.village_support = scaled_support

                -- Recall cost: max(20, 60% of base cost) for all levels
                for _, unit in ipairs(wesnoth.units.find_on_recall{side=1}) do
                    unit.recall_cost = math.max(20, math.floor(unit.__cfg.cost * 0.6))
                end

                -- Dynamic turn limit based on map size
                local map = wesnoth.current.map
                local area = map.playable_width * map.playable_height
                if area < 700 then
                    wesnoth.wml_actions.modify_turns{value=20}
                else
                    wesnoth.wml_actions.modify_turns{value=30}
                end

                -- Unlocked recruits are applied via [allow_extra_recruit] after [set_recruit] below
            >>
        [/lua]

        # Scenario base gold (added on top of carryover)
        # Scenario base gold handled by carryover + [side] gold

        # Hero traits handled by random_traits=yes in [side] tag
        # Carryover preserves traits across scenarios

        # Enemy leader traits handled by random_traits=yes in [side] tag

        # Player recruit list — Starting roster from design config
        [if]
            [variable]
                name = chosen_faction
                equals = loyalist
            [/variable]
            [then]
                [set_recruit]
                    side = 1
                    recruit = Spearman, Bowman, Cavalryman, Fencer, Merman Fighter
                [/set_recruit]
            [/then]
        [/if]
        [if]
            [variable]
                name = chosen_faction
                equals = elf
            [/variable]
            [then]
                [set_recruit]
                    side = 1
                    recruit = Elvish Fighter, Elvish Archer, Elvish Shaman, Elvish Scout
                [/set_recruit]
            [/then]
        [/if]
        [if]
            [variable]
                name = chosen_faction
                equals = orc
            [/variable]
            [then]
                [set_recruit]
                    side = 1
                    recruit = Orcish Grunt, Orcish Archer, Troll Whelp, Naga Fighter, Goblin Spearman
                [/set_recruit]
            [/then]
        [/if]
        [if]
            [variable]
                name = chosen_faction
                equals = undead
            [/variable]
            [then]
                [set_recruit]
                    side = 1
                    recruit = Skeleton, Skeleton Archer, Walking Corpse, Vampire Bat, Dark Adept, Ghoul
                [/set_recruit]
            [/then]
        [/if]
        [if]
            [variable]
                name = chosen_faction
                equals = drake
            [/variable]
            [then]
                [set_recruit]
                    side = 1
                    recruit = Drake Fighter, Drake Glider, Saurian Skirmisher, Saurian Augur
                [/set_recruit]
            [/then]
        [/if]
        [if]
            [variable]
                name = chosen_faction
                equals = knalgan
            [/variable]
            [then]
                [set_recruit]
                    side = 1
                    recruit = Dwarvish Fighter, Dwarvish Guardsman, Thief, Poacher, Footpad
                [/set_recruit]
            [/then]
        [/if]

        # Append any unlocked recruits from boss rewards
        [if]
            [variable]
                name = unlocked_recruits
                not_equals = ""
            [/variable]
            [then]
                [lua]
                    code = <<
                        local unlocked = wesnoth.get_variable("unlocked_recruits") or ""
                        for utype in unlocked:gmatch("[^,]+") do
                            wesnoth.wml_actions.allow_recruit{side=1, type=utype:match("^%s*(.-)%s*$")}
                        end
                    >>
                [/lua]
            [/then]
        [/if]

        # Randomize enemy via enemy_picker.lua
        [lua]
            code = <<
                local EP = wesnoth.dofile("~add-ons/Wesnoth_Roguelite/lua/enemy_picker.lua")
                local biome = wesnoth.get_variable("current_biome") or "plains"
                local bn = wesnoth.get_variable("battle_number") or 1
                local defeated = wesnoth.get_variable("defeated_leaders") or ""
                local is_boss = (bn == 5 or bn == 10 or bn == 15)

                -- Pick faction (mirror matchups allowed)
                local enemy_fac = EP.pick_faction(biome)

                -- Pick leader
                local leader = EP.pick_leader(enemy_fac, bn, defeated)

                -- Build recruit list (pass leader type for base-recruit guarantee)
                local recruits
                if is_boss then
                    recruits = EP.build_boss_recruit_list(enemy_fac, bn, leader.type)
                else
                    recruits = EP.build_recruit_list(enemy_fac, bn, leader.type)
                end

                -- Apply to side 2
                wesnoth.wml_actions.modify_unit{
                    wml.tag.filter{id="floor_boss"},
                    type = leader.type,
                    name = leader.name,
                    canrecruit = true,
                }

                -- Set recruit list
                local side2 = wesnoth.sides[2]
                wesnoth.wml_actions.set_recruit{
                    side = 2,
                    recruit = table.concat(recruits, ","),
                }

                -- Set gold and income
                local fac_names = {
                    loyalists="Loyalist Warband", rebels="Elven Wardens",
                    northerners="Orcish Horde", undead="The Undead",
                    drakes="Drake Warhost", knalgan="Knalgan Outlaws",
                }
                wesnoth.wml_actions.modify_side{
                    side = 2,
                    gold = EP.enemy_gold(bn, is_boss),
                    income = EP.enemy_income(bn),
                    village_gold = 2,
                    village_support = 1 + (bn - 1),
                    user_team_name = fac_names[enemy_fac] or "Enemy",
                }

                -- Store for tracking
                wesnoth.set_variable("current_enemy_faction", enemy_fac)
                wesnoth.set_variable("current_enemy_leader", leader.name)
            >>
        [/lua]

        # Enemy gold scaling now handled by enemy_picker.lua

        # Apply random traits to leaders (engine skips leaders for MP OOS reasons)
        # MUST run after all modify_unit{type=} calls, as type changes wipe traits
        [lua]
            code = <<
                local TU = wesnoth.dofile("~add-ons/Wesnoth_Roguelite/lua/trait_utils.lua")
                local bn = wesnoth.get_variable("battle_number") or 1
                -- Hero: only on battle 1 (carryover preserves traits after that)
                if bn == 1 then
                    local hero = wesnoth.units.find_on_map{id="hero"}[1]
                    if hero then
                        TU.apply_random_traits(hero)
                        hero.hitpoints = hero.max_hitpoints
                    end
                end
                -- Enemy leader: every battle
                local boss = wesnoth.units.find_on_map{id="floor_boss"}[1]
                if boss then
                    TU.apply_random_traits(boss)
                    boss.hitpoints = boss.max_hitpoints
                end
            >>
        [/lua]
    [/event]

    # Auto-deploy loyal champion near hero each battle
    [event]
        name = prestart
        [lua]
            code = <<
                local champ_id = wesnoth.get_variable("loyal_champion_id")
                if not champ_id or champ_id == "" then return end
                -- Check if already on map
                if wesnoth.units.find_on_map{id=champ_id}[1] then return end
                -- Find on recall list
                local champ = wesnoth.units.find_on_recall{id=champ_id, side=1}[1]
                if not champ then return end
                -- Place near hero's keep
                local hero = wesnoth.units.find_on_map{id="hero"}[1]
                if not hero then return end
                -- Find an empty hex adjacent to hero
                local placed = false
                local a, b, c, d, e, f = wesnoth.map.get_adjacent_hexes(hero.x, hero.y)
                for _, hex in ipairs({a, b, c, d, e, f}) do
                    if not wesnoth.units.get(hex[1], hex[2]) then
                        local t = wesnoth.current.map[hex]
                        if t and not tostring(t):find("X") then
                            champ:to_map(hex[1], hex[2])
                            champ.moves = champ.max_moves
                            champ.hitpoints = champ.max_hitpoints
                            placed = true
                            break
                        end
                    end
                end
                -- Fallback: place on hero's hex (Wesnoth will bump to nearest)
                if not placed then
                    champ:to_map(hero.x, hero.y)
                end
            >>
        [/lua]
    [/event]

    # Loot spawn — 25% chance per non-boss battle (100% for testing)
    [event]
        name = prestart
        [lua]
            code = <<
                local LOOT = wesnoth.dofile("~add-ons/Wesnoth_Roguelite/lua/loot.lua")
                local bn = wesnoth.get_variable("battle_number") or 1
                -- No loot on boss battles
                if bn == 5 or bn == 10 or bn == 15 then return end
                local tier = LOOT.get_tier(bn)
                if not tier then return end

                local spawn_chance = 100 -- TODO: change to 25 after testing
                if wesnoth.random(1, 100) > spawn_chance then return end

                local item_count = 3 -- TODO: change to 1 after testing
                local items = LOOT.pick_items(bn, item_count)

                -- Get starting locations
                local s1 = wesnoth.current.map.special_locations[1] or wesnoth.current.map.special_locations["1"]
                local s2 = wesnoth.current.map.special_locations[2] or wesnoth.current.map.special_locations["2"]
                local p1x, p1y, p2x, p2y
                if s1 then p1x, p1y = s1[1], s1[2] end
                if s2 then p2x, p2y = s2[1], s2[2] end
                -- Fallback: find leaders on map
                if not p1x then
                    local hero = wesnoth.units.find_on_map{id="hero"}[1]
                    if hero then p1x, p1y = hero.x, hero.y end
                end
                if not p2x then
                    local enemy = wesnoth.units.find_on_map{side=2, canrecruit=true}[1]
                    if enemy then p2x, p2y = enemy.x, enemy.y end
                end
                if not p1x or not p2x then return end

                local placed = 0
                local used = {}
                for _, item in ipairs(items) do
                    local hex = LOOT.find_loot_hex{p1x=p1x, p1y=p1y, p2x=p2x, p2y=p2y, used=used}
                    if hex then
                        used[hex[1] .. "," .. hex[2]] = true
                        wesnoth.wml_actions.item{x=hex[1], y=hex[2], image=item.map_image, name="loot_" .. placed}
                        -- Store loot data in WML variables
                        local vi = "loot_items[" .. placed .. "]"
                        wesnoth.set_variable(vi .. ".x", hex[1])
                        wesnoth.set_variable(vi .. ".y", hex[2])
                        wesnoth.set_variable(vi .. ".id", item.id)
                        wesnoth.set_variable(vi .. ".name", item.name)
                        wesnoth.set_variable(vi .. ".find_flavor", item.find_flavor)
                        wesnoth.set_variable(vi .. ".equip_flavor", item.equip_flavor)
                        wesnoth.set_variable(vi .. ".desc", item.desc)
                        wesnoth.set_variable(vi .. ".dialog_image", item.dialog_image)
                        wesnoth.set_variable(vi .. ".map_image", item.map_image)
                        placed = placed + 1
                    end
                end
                wesnoth.set_variable("loot_item_count", placed)
            >>
        [/lua]
    [/event]

