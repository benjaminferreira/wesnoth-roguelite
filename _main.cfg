#textdomain wesnoth-Wesnoth_Roguelite

[textdomain]
    name = wesnoth-Wesnoth_Roguelite
    path = data/add-ons/Wesnoth_Roguelite/translations
[/textdomain]

[campaign]
    id = Wesnoth_Roguelite
    name = _"Wesnoth Roguelike"
    icon = "units/human-loyalists/lieutenant.png"
    abbrev = _"WR"
    description = _"Lead a warband through 15 battles across procedurally generated battlefields. Choose your path, recruit wanderers, and face powerful bosses — but death is permanent. Each run reshapes the map, the enemies, and the choices you'll face.

" + _"Six factions. Dozens of unlockable units. Persistent meta-progression between runs.

" + _"NOTE: Difficulty Level has not been implemented at this time. All difficulties will play the same.

" + _"(Intermediate level. Single player. 12 Regular Scenarios, 3 Boss Fights)"
    image = "portraits/humans/lieutenant.png"
    first_scenario = roguelite_home
    define = WESNOTH_ROGUELITE
    rank = 990

    {CAMPAIGN_DIFFICULTY EASY "units/human-loyalists/spearman.png~RC(magenta>red)" _"Militia" _"Easy"}
    {CAMPAIGN_DIFFICULTY NORMAL "units/human-loyalists/swordsman.png~RC(magenta>red)" _"Soldier" _"Normal"}
    {CAMPAIGN_DIFFICULTY HARD "units/human-loyalists/general.png~RC(magenta>red)" _"Commander" _"Hard"}
[/campaign]

#ifdef WESNOTH_ROGUELITE
    [binary_path]
        path = data/add-ons/Wesnoth_Roguelite
    [/binary_path]
    {~add-ons/Wesnoth_Roguelite/utils}
    {~add-ons/Wesnoth_Roguelite/scenarios}
#endif
