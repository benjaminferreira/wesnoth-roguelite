#textdomain wesnoth-Wesnoth_Roguelite

[scenario]
    id = roguelite_path_choice
    name = _"Choose Your Path"
    next_scenario = roguelite_battle_forest

    map_file = tavern.map
    turns = 1
    victory_when_enemies_defeated = no

    [side]
        side = 1
        controller = human
        hidden = yes
        [leader]
            id = hero
            type = Spearman
            canrecruit = yes
        [/leader]
    [/side]

    [event]
        name = prestart

        [lua]
            code = <<
                local UI = wesnoth.dofile("~add-ons/Wesnoth_Roguelite/lua/roguelite_ui.lua")

                local bn = wesnoth.get_variable("battle_number") or 1
                local faction = wesnoth.get_variable("chosen_faction") or "loyalist"
                local last_type = wesnoth.get_variable("last_scenario_type") or "start"
                local leader = wesnoth.get_variable("last_enemy_leader") or "the enemy"
                local territory = wesnoth.get_variable("last_territory_name") or "the battlefield"
                local used_names = wesnoth.get_variable("used_territory_names") or ""

                -- =====================
                -- BIOME DATA (3 named variants each, 39 total)
                -- =====================
                local biomes = {
                    {key="plains", names={
                        {"The Greenfield","Open grassland. Good ground for cavalry, but nowhere to hide."},
                        {"Warden's Reach","Flat country, scattered farmsteads. Fast marching, but exposed."},
                        {"The Windrun","Rolling hills and tall grass. The wind carries sound for miles."},
                    }},
                    {key="forest", names={
                        {"The Darkwood","Dense forest. Good cover, but visibility is poor."},
                        {"Thornwall Thicket","Old growth, tangled undergrowth. Slow going, but defensible."},
                        {"The Whispering Pines","Tall pines, soft ground. Quiet. Maybe too quiet."},
                    }},
                    {key="elven_forest", names={
                        {"The Silverleaf","Ancient elven woodland. The trees here still have power."},
                        {"Starfall Glade","Sacred ground. The canopy glows faintly at night."},
                        {"The Warden's Wood","Elven watchtowers dot the canopy. Someone was guarding this place."},
                    }},
                    {key="farmland", names={
                        {"The Fallow Fields","Abandoned farms. Good terrain, but the silence is unsettling."},
                        {"Millhaven","Ruined village with stone walls. Could be useful cover."},
                        {"The Breadbasket","Once the richest farmland in the kingdom. Now it feeds crows."},
                    }},
                    {key="valley", names={
                        {"The Rift","Narrow valley, steep walls. A chokepoint if you use it right."},
                        {"Greenhollow","Sheltered valley with a river. Good ground, but limited retreat."},
                        {"The King's Scar","A great gash in the earth. Old battlefield. The crows remember."},
                    }},
                    {key="mountain", names={
                        {"Stonecrest Pass","Mountain trail. High ground, but slow going for heavy troops."},
                        {"The Iron Teeth","Jagged peaks, narrow paths. Dwarves would love it. Everyone else, less so."},
                        {"Cloudbreak Summit","Above the treeline. Cold, exposed, but you can see for leagues."},
                    }},
                    {key="swamp", names={
                        {"The Saltmarsh","Coastal wetlands. Open, but the mud will drag at your boots."},
                        {"Rotwater Fen","Stinking bog. Disease and poor footing. Nobody comes here by choice."},
                        {"The Drowned Mire","Half-sunken ruins in black water. Something lives here."},
                    }},
                    {key="winter", names={
                        {"The Frostmarch","Frozen plains. The cold will slow your troops, but the ground is solid."},
                        {"Iceveil Pass","Snow-choked mountain pass. Brutal, but it's the shortest route."},
                        {"The White Waste","Endless snow. No shelter, no landmarks. Bring supplies."},
                    }},
                    {key="cave", names={
                        {"The Underhalls","Old dwarven tunnels. Cramped, dark, but solid stone underfoot."},
                        {"Blackstone Caverns","Natural caves. Watch your footing — the floor drops away without warning."},
                        {"The Worm Warrens","Something large carved these tunnels. Hopefully it moved on."},
                    }},
                    {key="lava", names={
                        {"The Crucible","Volcanic caverns. The heat alone will test your endurance."},
                        {"Ashfall Depths","Rivers of molten rock. One wrong step and you're done."},
                        {"The Ember Pit","The air shimmers. Even the stone sweats here."},
                    }},
                    {key="mushroom", names={
                        {"The Fungal Grotto","Underground grove of giant mushrooms. Strange, but passable."},
                        {"Sporecap Hollow","The air is thick with spores. Cover your mouths."},
                        {"The Glowing Deep","Bioluminescent caverns. Beautiful, in a deeply unsettling way."},
                    }},
                    {key="desert", names={
                        {"The Sunscorch","Open desert. No shade, no water. Move fast or cook."},
                        {"Dusthaven Ruins","Sand-buried ruins. Some walls still stand — could provide cover."},
                        {"The Glass Flats","The sand here was fused by some ancient fire. It crunches underfoot."},
                    }},
                    {key="coastal", names={
                        {"The Shattered Coast","Rocky shoreline. Tide pools and sea caves. Watch the water."},
                        {"Driftwood Bay","Sandy beach with wrecked ships. Good lumber if you need barricades."},
                        {"The Salt Cliffs","High cliffs over crashing waves. Dramatic, but the wind is murder."},
                    }},
                }

                -- =====================
                -- FILTER OUT USED TERRITORY NAMES
                -- =====================
                local available_biomes = {}
                for _, b in ipairs(biomes) do
                    local avail_names = {}
                    for _, n in ipairs(b.names) do
                        if not used_names:find(n[1], 1, true) then
                            table.insert(avail_names, n)
                        end
                    end
                    if #avail_names > 0 then
                        table.insert(available_biomes, {key=b.key, names=avail_names})
                    end
                end
                -- Fallback: if somehow all 39 are used, reset
                if #available_biomes < 3 then
                    available_biomes = biomes
                    used_names = ""
                end

                -- Pick 3 unique biomes with unused names
                local picks = {}
                local used_idx = {}
                local attempts = 0
                while #picks < 3 and attempts < 100 do
                    local idx = wesnoth.random(1, #available_biomes)
                    if not used_idx[idx] then
                        used_idx[idx] = true
                        local b = available_biomes[idx]
                        local v = b.names[wesnoth.random(1, #b.names)]
                        table.insert(picks, {key=b.key, name=v[1], desc=v[2]})
                    end
                    attempts = attempts + 1
                end

                -- =====================
                -- CONTEXT-AWARE FLAVOR TEXT (10 per faction × 6 factions)
                -- =====================
                local L = leader
                local T = territory

                local flavor = {
                    loyalist = {
                        battle = {
                            "The banners of " .. L .. " lie in the mud of " .. T .. ". Your soldiers march on, bloodied but unbroken.",
                            T .. " is behind you now. The men are tired, but morale is high. Word of your victories is spreading.",
                            "Another warlord's territory claimed. The soldiers sharpen their blades and wait for orders.",
                        },
                        boss = {
                            "The fall of " .. L .. " has sent shockwaves through the region. Lesser warlords scatter at the mention of your name.",
                            L .. " is dead. Your lieutenants gather around the map table, eager. The road to the capital grows shorter.",
                        },
                        tavern = {
                            "Rested and resupplied, your company forms up at dawn. New faces in the ranks. Good.",
                            "The ale was cheap and the beds were hard, but your troops march with fresh purpose.",
                            "You leave the tavern with a heavier purse and a stronger warband. The road calls.",
                        },
                        general = {
                            "Your scouts fan out at first light. Three routes. Three risks. Your call, commander.",
                            "The column halts at a crossroads. Your outriders report back with options.",
                        },
                    },
                    elf = {
                        battle = {
                            "The trees of " .. T .. " still whisper of the battle. You press deeper into human lands.",
                            L .. "'s warband is scattered. The forest remembers those who trespass — and those who defend it.",
                            "Another stretch of land secured. The corruption recedes, if only slightly.",
                        },
                        boss = {
                            L .. " fell like a rotting oak. The land breathes easier, and your warband moves with renewed grace.",
                            "With " .. L .. " gone, the lesser warbands will think twice before entering elven territory.",
                        },
                        tavern = {
                            "Your warriors emerge from rest with sharp eyes and steady hands. The hunt continues.",
                            "New allies have joined the cause. The forest's reach extends.",
                            "A night under a roof instead of stars. Your scouts are already ranging ahead.",
                        },
                        general = {
                            "The wind shifts. Your scouts read the land and offer three ways forward.",
                            "Dawn breaks through the canopy. Three trails diverge ahead.",
                        },
                    },
                    orc = {
                        battle = {
                            "Good fight in " .. T .. ". Warband took what it wanted and moved on.",
                            L .. "'s skull would make a fine trophy. The warband howls and marches on.",
                            T .. " had decent loot. The goblins are fighting over scraps already.",
                        },
                        boss = {
                            L .. " put up a real fight. Respect. Now strip the corpse and move.",
                            "The warlord " .. L .. " is done. Warband's hungry for the next one.",
                        },
                        tavern = {
                            "Bellies full, blades sharp. Good enough.",
                            "New blood from the tavern. They'll learn fast or die fast.",
                            "Enough rest. Where's the next fight?",
                        },
                        general = {
                            "Wolf riders found three trails. All of them lead somewhere worth hitting.",
                            "Scouts came back with options. Doesn't matter which — all end in blood.",
                        },
                    },
                    undead = {
                        battle = {
                            "The dead of " .. T .. " stir in your wake. Some may yet serve.",
                            L .. " resisted. " .. L .. " fell. The pattern holds.",
                            "Another territory claimed by silence. Your host drifts onward.",
                        },
                        boss = {
                            "The warlord " .. L .. " joins the ranks of the fallen. In death, all serve.",
                            L .. "'s defenses crumbled like dry bone. The living grow fearful. Good.",
                        },
                        tavern = {
                            "The living rested. You did not need to. But the new recruits may prove useful.",
                            "Fresh souls have joined your march. They do not yet understand what that means.",
                            "The tavern's warmth meant nothing to you. But the information gathered there did.",
                        },
                        general = {
                            "Three paths stretch into the gloom. The dead do not hesitate.",
                            "Your spectral scouts return with whispers of what lies ahead.",
                        },
                    },
                    drake = {
                        battle = {
                            T .. " burns behind you. The flight circles overhead, victorious.",
                            L .. "'s forces broke against drakefire. Onward. More territory to claim.",
                            "The ashes of " .. T .. " cool in your wake. The flight needs more ground.",
                        },
                        boss = {
                            L .. " burned well. The flight roars approval. This land will be yours.",
                            "With " .. L .. " destroyed, the skies are clear. Your wings carry you further south.",
                        },
                        tavern = {
                            "The ground-dwellers' tavern was cramped, but the recruits are strong enough.",
                            "Rested and fed. The flight takes wing at dawn.",
                            "New fighters. New fire. The nesting grounds grow closer with every victory.",
                        },
                        general = {
                            "Your gliders return from scouting. Three territories within striking distance.",
                            "The thermals shift. Three routes present themselves to the flight.",
                        },
                    },
                    knalgan = {
                        battle = {
                            T .. " paid out nicely. The lads are counting coin and sharpening axes.",
                            L .. "'s vault was disappointingly empty. The next one better pay.",
                            "Another job done. The dwarves drink, the rogues gamble, and you plan the next move.",
                        },
                        boss = {
                            L .. " had deep pockets. The company eats well tonight.",
                            "The warlord " .. L .. " won't be collecting tolls anymore. That's your job now.",
                        },
                        tavern = {
                            "New hires, fresh intel, and a hangover. Business as usual.",
                            "The company swells. More blades, more problems, more profit.",
                            "Back on the road. The dwarves grumble about the surface. The rogues grumble about the dwarves.",
                        },
                        general = {
                            "Your scouts — a thief and a dwarf who hate each other — agree on three options.",
                            "Three prospects. Three paydays. Pick one, boss.",
                        },
                    },
                }

                -- Pick appropriate flavor text
                local fac_flavor = flavor[faction] or flavor.loyalist
                local pool
                if last_type == "boss" and fac_flavor.boss then
                    pool = fac_flavor.boss
                elseif last_type == "tavern" and fac_flavor.tavern then
                    pool = fac_flavor.tavern
                elseif last_type == "battle" and fac_flavor.battle then
                    pool = fac_flavor.battle
                else
                    pool = fac_flavor.general
                end
                local caption = pool[wesnoth.random(1, #pool)]

                -- =====================
                -- SHOW CHOICE
                -- =====================
                local opts = {}
                for _, p in ipairs(picks) do
                    table.insert(opts, {label=p.name, description=p.desc})
                end

                local choice = UI.choose{
                    title="Battle " .. bn,
                    message=caption,
                    options=opts,
                }

                local picked = picks[choice]
                wesnoth.set_variable("current_biome", picked.key)
                wesnoth.set_variable("current_territory_name", picked.name)

                -- Mark this territory name as used
                if used_names == "" then
                    wesnoth.set_variable("used_territory_names", picked.name)
                else
                    wesnoth.set_variable("used_territory_names", used_names .. "|" .. picked.name)
                end
            >>
        [/lua]

        # DEBUG: skip to tavern or boss for testing
        [message]
            speaker = narrator
            image = "wesnoth-icon.png"
            message = "DEBUG: Where to?"
            variable = debug_skip
            [option]
                label = "Play the battle"
                value = battle
            [/option]
            [option]
                label = "Skip to tavern"
                value = tavern
            [/option]
            [option]
                label = "Boss: Greyhelm the Unmovable (Loyalist)"
                value = boss_greyhelm
            [/option]
            [option]
                label = "Boss: Briarwen (Elf)"
                value = boss_briarwen
            [/option]
            [option]
                label = "Boss: Maggash and the Horde (Orc)"
                value = boss_maggash
            [/option]
            [option]
                label = "Boss: The Pale Conductor (Undead)"
                value = boss_pale_conductor
            [/option]
            [option]
                label = "Boss: Sithrak the Exile (Drake)"
                value = boss_sithrak
            [/option]
            [option]
                label = "Boss: The Ironband (Knalgan)"
                value = boss_ironband
            [/option]
        [/message]
        [if]
            [variable]
                name = debug_skip
                equals = tavern
            [/variable]
            [then]
                [endlevel]
                    result = victory
                    next_scenario = roguelite_tavern
                    bonus = no
                    carryover_percentage = 100
                    carryover_report = no
                    linger_mode = no
                    carryover_add = yes
                [/endlevel]
            [/then]
        [/if]
        [if]
            [variable]
                name = debug_skip
                not_equals = battle
            [/variable]
            [variable]
                name = debug_skip
                not_equals = tavern
            [/variable]
            [then]
                # Extract boss id from "boss_XXX"
                [lua]
                    code = <<
                        local val = wesnoth.get_variable("debug_skip") or ""
                        local boss_id = val:match("^boss_(.+)$")
                        if boss_id then
                            wesnoth.set_variable("debug_boss_id", boss_id)
                        end
                    >>
                [/lua]
                {VARIABLE battle_number 5}
                [endlevel]
                    result = victory
                    next_scenario = roguelite_boss1
                    bonus = no
                    carryover_percentage = 100
                    carryover_report = no
                    linger_mode = no
                    carryover_add = yes
                [/endlevel]
            [/then]
        [/if]
        {CLEAR_VARIABLE debug_skip}

        # Route to boss or normal battle
        [if]
            [variable]
                name = battle_number
                equals = 5
            [/variable]
            [then]
                [endlevel]
                    result = victory
                    next_scenario = roguelite_boss1
                    bonus = no
                    carryover_percentage = 0
                    carryover_report = no
                    linger_mode = no
                [/endlevel]
            [/then]
        [/if]

        [endlevel]
            result = victory
            next_scenario = roguelite_battle_$current_biome
            bonus = no
            carryover_percentage = 0
            carryover_report = no
            linger_mode = no
        [/endlevel]
    [/event]
[/scenario]
