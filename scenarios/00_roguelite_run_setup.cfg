#textdomain wesnoth-Wesnoth_Roguelite

# Run Setup — initializes meta variables, resets per-run state,
# then routes to character select.

[scenario]
    id = roguelite_run_setup
    name = _"Preparing for Battle"
    next_scenario = roguelite_character_select

    map_file = run_setup.map
    turns = 1
    victory_when_enemies_defeated = no

    [side]
        side = 1
        controller = human
        hidden = yes
        [leader]
            id = hero
            type = Lieutenant
            canrecruit = yes
        [/leader]
    [/side]

    [event]
        name = prestart

        # --- First-run initialization ---
        [if]
            [variable]
                name = run_number
                equals = ""
            [/variable]
            [then]
                {VARIABLE run_number 0}
                {VARIABLE total_kills 0}
                # Meta-progression (persists across runs)
                {VARIABLE factions_unlocked "loyalist,elf,orc"}
                {VARIABLE encounter_pool_unlocked ""}
                {VARIABLE boss_rewards_unlocked ""}
            [/then]
        [/if]

        # --- Increment run counter ---
        {VARIABLE_OP run_number add 1}

        # --- Reset per-run variables ---
        {VARIABLE kills_this_run 0}
        {VARIABLE floors_cleared 0}
        {VARIABLE battle_number 1}
        {VARIABLE act_number 1}
        {VARIABLE renown 0}
        {VARIABLE tier2_unlocked no}
        {VARIABLE tier3_unlocked no}
        {VARIABLE unlocked_recruits ""}
        {VARIABLE defeated_leaders ""}
        {VARIABLE encountered_units ""}
        {VARIABLE run_pool_unlocked ""}
        {VARIABLE used_territory_names ""}
        {VARIABLE territories_won ""}
        {VARIABLE bosses_slain ""}
        {VARIABLE wanderers_hired 0}
        {VARIABLE last_territory_name ""}
        {VARIABLE last_enemy_leader ""}
        {VARIABLE last_scenario_type "start"}
        {VARIABLE chosen_faction ""}
        {VARIABLE hero_type ""}
        {VARIABLE hero_name ""}
        {VARIABLE current_biome ""}
        {VARIABLE encounter_type ""}

        # --- Route to character select ---
        [endlevel]
            result = victory
            next_scenario = roguelite_character_select
            bonus = no
            carryover_percentage = 0
            carryover_report = no
            linger_mode = no
        [/endlevel]
    [/event]
[/scenario]
