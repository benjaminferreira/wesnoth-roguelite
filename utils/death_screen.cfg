#textdomain wesnoth-Wesnoth_Roguelite

#define ROGUELITE_DEATH_EVENT
    [event]
        name = last_breath
        first_time_only = no
        [filter]
            id = hero
        [/filter]

        # Death narrative
        [lua]
            code = <<
                local faction = wesnoth.get_variable("chosen_faction") or "loyalist"
                local name = wesnoth.get_variable("hero_name") or "the commander"
                local territory = wesnoth.get_variable("current_territory_name") or "the battlefield"

                local death_lines = {
                    loyalist = {
                        name .. " falls, and the banner falls with them. The soldiers scatter into the hills.",
                        "The line breaks. " .. name .. " is gone. The kingdom's last hope dies in " .. territory .. ".",
                        name .. "'s sword clatters to the ground. The enemy closes in. It is over.",
                    },
                    elf = {
                        "The forest mourns. " .. name .. " returns to the earth, and the trees grow silent.",
                        name .. " falls among the roots. The ancient song falters, then fades.",
                        "An arrow finds its mark. " .. name .. " breathes their last beneath an uncaring sky.",
                    },
                    orc = {
                        name .. " goes down swinging. A good death. The warband scatters without a leader.",
                        "The warchief falls. The goblins flee first. Then the rest.",
                        name .. " dies on their feet. The enemy will remember this fight.",
                    },
                    undead = {
                        "The dark magic unravels. " .. name .. "'s host crumbles to dust and bone.",
                        "Without " .. name .. "'s will to bind them, the dead return to stillness.",
                        "The necromancer falls. The corpses collapse. Silence reclaims " .. territory .. ".",
                    },
                    drake = {
                        name .. "'s wings fold for the last time. The flight scatters to the winds.",
                        "Drakefire gutters and dies. " .. name .. " falls from the sky.",
                        "The flight leader is gone. Without " .. name .. ", the drakes have no direction.",
                    },
                    knalgan = {
                        name .. " falls, purse still heavy. A lot of good that does now.",
                        "The company breaks. " .. name .. " dies rich and dead in " .. territory .. ".",
                        "The dwarves retreat underground. The rogues vanish. " .. name .. " is left behind.",
                    },
                }

                local pool = death_lines[faction] or death_lines.loyalist
                local line = pool[wesnoth.random(1, #pool)]

                wesnoth.wml_actions.message{
                    speaker = "narrator",
                    image = "wesnoth-icon.png",
                    message = "<b>" .. name .. " has fallen.</b>\n\n<i>" .. line .. "</i>",
                }
            >>
        [/lua]

        # Run stats
        [lua]
            code = <<
                local fc = wesnoth.get_variable("floors_cleared") or 0
                local flavor
                if fc <= 1 then
                    local t = {"A brief campaign. Barely begun.","Cut down before the story could start.","One battle. That's all they'll remember."}
                    flavor = t[wesnoth.random(1, #t)]
                elseif fc <= 4 then
                    local t = {"A promising start, cut short.","The warband was finding its stride. Not anymore.","They fought well. It wasn't enough."}
                    flavor = t[wesnoth.random(1, #t)]
                elseif fc <= 9 then
                    local t = {"A real contender, brought low.","They made it further than most. Cold comfort.","Halfway to the throne. Halfway is nothing."}
                    flavor = t[wesnoth.random(1, #t)]
                else
                    local t = {"So close to the throne. So close.","The kingdom almost had its savior.","A legend in the making — unmade at the last."}
                    flavor = t[wesnoth.random(1, #t)]
                end
                wesnoth.set_variable("stats_flavor", flavor)
            >>
        [/lua]
        [message]
            speaker = narrator
            image = "wesnoth-icon.png"
            message = _"<b>Run $run_number — $hero_name's Legacy</b>
<i>$stats_flavor</i>

Battles won: $floors_cleared
Enemies slain: $kills_this_run
Territories claimed: $territories_won
Bosses defeated: $bosses_slain
Wanderers recruited: $wanderers_hired
Renown earned: $renown"
        [/message]

        # Single option — play again
        [lua]
            code = <<
                local msgs = {
                    "The road goes on. Another will take up the fight.",
                    "This is not the end. Not yet.",
                    "The kingdom still burns. Someone else will carry the torch.",
                    "Death is not defeat. It is a lesson. Learn it well.",
                    "The warband scatters. But the cause remains.",
                }
                wesnoth.set_variable("death_prompt", msgs[wesnoth.random(1, #msgs)])
            >>
        [/lua]
        [message]
            speaker = narrator
            image = "wesnoth-icon.png"
            message = _"$death_prompt"
            [option]
                label = _"Begin a new run"
                image = "icons/action/editor-tool-unit_20.png"
                [command]
                    {VARIABLE death_choice "new_run"}
                [/command]
            [/option]
            [option]
                label = _"Exit to main menu (load your save to continue later)"
                image = "icons/action/editor-tool-resize-map_20.png"
                [command]
                    {VARIABLE death_choice "quit"}
                [/command]
            [/option]
        [/message]

        {VARIABLE hero_died yes}

        # Track meta stats
        {VARIABLE_OP total_deaths add 1}
        [lua]
            code = <<
                local kills = wesnoth.get_variable("kills_this_run") or 0
                local floors = wesnoth.get_variable("battle_number") or 1
                local best_k = wesnoth.get_variable("best_run_kills") or 0
                local best_f = wesnoth.get_variable("best_run_floors") or 0
                if kills > best_k then wesnoth.set_variable("best_run_kills", kills) end
                if floors > best_f then wesnoth.set_variable("best_run_floors", floors) end
                wesnoth.set_variable("last_hero_name", wesnoth.get_variable("hero_name") or "")
                wesnoth.set_variable("last_hero_faction", wesnoth.get_variable("chosen_faction") or "")

                -- Pool unlock: one encounter unit if past boss 1
                local bn = wesnoth.get_variable("battle_number") or 1
                if bn > 5 then
                    local enc_unlocked = wesnoth.get_variable("encounter_pool_unlocked") or ""

                    local enc_order = {
                        "Wose Shaman","Wraith","Death Squire","Shadow",
                        "Orcish Ruler","Mermaid Diviner","Dwarvish Runemaster",
                        "Inferno Drake","Drake Flameheart","Elvish Enchantress",
                        "Elvish High Lord","Great Troll","Death Knight",
                        "Orcish Sovereign","Lich","Necromancer",
                        "Dwarvish Arcanister","Grand Marshal","Great Mage",
                        "Armageddon Drake","Elvish Sylph","Ancient Lich",
                    }

                    local next_enc
                    for _, name in ipairs(enc_order) do
                        if not enc_unlocked:find(name, 1, true) then next_enc = name; break end
                    end

                    if next_enc then
                        wesnoth.set_variable("encounter_pool_unlocked",
                            enc_unlocked == "" and next_enc or (enc_unlocked .. "," .. next_enc))
                        wesnoth.wml_actions.message{
                            speaker = "narrator", image = "wesnoth-icon.png",
                            message = "Your sacrifice was not in vain. A new encounter has been unlocked: " .. next_enc .. "!",
                        }
                    end
                end
            >>
        [/lua]

        # Reset per-run variables, keep meta-progression
        {VARIABLE kills_this_run 0}
        {VARIABLE floors_cleared 0}
        {VARIABLE battle_number 1}
        {VARIABLE act_number 1}
        {VARIABLE renown 0}
        {VARIABLE tier2_unlocked no}
        {VARIABLE tier3_unlocked no}
        {VARIABLE unlocked_recruits ""}
        {VARIABLE defeated_leaders ""}
        {VARIABLE encountered_units ""}
        {VARIABLE run_pool_unlocked ""}
        {VARIABLE used_territory_names ""}
        {VARIABLE territories_won ""}
        {VARIABLE bosses_slain ""}
        {VARIABLE wanderers_hired 0}
        {VARIABLE last_territory_name ""}
        {VARIABLE last_enemy_leader ""}
        {VARIABLE last_scenario_type "start"}
        {VARIABLE current_biome ""}
        {VARIABLE encounter_type ""}

        [kill]
            side = 1
            fire_event = no
            [not]
                id = hero
            [/not]
        [/kill]

        [if]
            [variable]
                name = death_choice
                equals = quit
            [/variable]
            [then]
                {CLEAR_VARIABLE death_choice}
                [endlevel]
                    result = defeat
                [/endlevel]
            [/then]
            [else]
                {CLEAR_VARIABLE death_choice}
                [endlevel]
                    result = victory
                    next_scenario = roguelite_home
                    bonus = no
                    carryover_percentage = 0
                    carryover_report = no
                    linger_mode = no
                [/endlevel]
            [/else]
        [/if]
    [/event]
#enddef
